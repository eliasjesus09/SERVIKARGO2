  <!-- Detector de conexión — muestra error claro si los scripts CDN no cargan -->
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        if (typeof React === 'undefined' || typeof firebase === 'undefined') {
          document.getElementById('root').innerHTML =
            '<div style="padding:30px;font-family:sans-serif;text-align:center;max-width:380px;margin:0 auto">' +
            '<div style="font-size:56px;margin-bottom:16px">📡</div>' +
            '<h2 style="color:#dc2626;margin-bottom:12px;font-size:22px">Sin conexión a internet</h2>' +
            '<p style="color:#64748b;font-size:15px;line-height:1.8;margin-bottom:20px">' +
            'Esta app necesita internet activo para cargar.<br>' +
            'Activa WiFi o datos móviles y <strong>recarga la página</strong>.</p>' +
            '<button onclick="location.reload()" style="background:#0A4F6E;color:#fff;border:none;padding:14px 28px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer">🔄 Recargar</button>' +
            '<p style="color:#94a3b8;font-size:12px;margin-top:20px">💡 Tip: usa la app desde Netlify para que cargue más rápido.</p>' +
            '</div>';
        }
      }, 4000); // esperar 4s a que carguen los scripts
    });
  </script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Barlow',sans-serif;background:#FDF6EC;color:#0F1923}
    input,select,textarea,button{font-family:'Barlow',sans-serif}
    button{cursor:pointer;border:none}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f1f1f1}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes slideIn{from{transform:translateX(120%)}to{transform:translateX(0)}}
    @keyframes modalIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}

  <!-- ═══ PWA: MANIFEST + SERVICE WORKER + INSTALL ════════════════════════ -->
  <script>
  (function(){
    // ── Generar ícono ServiKargo con canvas ────────────────────────────────
    // Trabajador con casco + llave + motocarro sobre fondo naranja
    function mkIcon(size){
      try{
        var c=document.createElement('canvas'); c.width=c.height=size;
        var x=c.getContext('2d');
        var s=size, r=s*0.22;
        // Fondo redondeado naranja
        x.beginPath(); x.moveTo(r,0); x.lineTo(s-r,0);
        x.arcTo(s,0,s,r,r); x.lineTo(s,s-r);
        x.arcTo(s,s,s-r,s,r); x.lineTo(r,s);
        x.arcTo(0,s,0,s-r,r); x.lineTo(0,r);
        x.arcTo(0,0,r,0,r); x.closePath();
        var grad=x.createLinearGradient(0,0,s,s);
        grad.addColorStop(0,'#E8622A'); grad.addColorStop(1,'#C4511E');
        x.fillStyle=grad; x.fill();

        // Escalar todo al tamaño del ícono (viewBox 110x88 → size)
        var sc=s/120; x.save(); x.translate(s*0.05,s*0.08); x.scale(sc,sc);
        x.strokeStyle='white'; x.fillStyle='white'; x.lineCap='round'; x.lineJoin='round';

        // ── TRABAJADOR ──
        // Cabeza
        x.beginPath(); x.arc(32,19,9,0,Math.PI*2); x.fill();
        // Casco (naranja oscuro)
        x.fillStyle='#C4511E';
        x.beginPath(); x.moveTo(23,20);
        x.bezierCurveTo(23,7,32,5,32,5);
        x.bezierCurveTo(41,7,41,20,41,20);
        x.bezierCurveTo(38,22,38,13,32,11);
        x.bezierCurveTo(26,13,26,22,23,20);
        x.closePath(); x.fill();
        // Visera casco
        x.fillStyle='white';
        x.beginPath(); x.roundRect(21,20,22,4,2); x.fill();
        // Cuerpo
        x.fillStyle='white'; x.strokeStyle='white';
        x.lineWidth=6;
        x.beginPath(); x.moveTo(32,28); x.lineTo(37,47); x.stroke();
        // Pierna
        x.lineWidth=5;
        x.beginPath(); x.moveTo(35,45); x.lineTo(46,54); x.stroke();
        // Brazo manubrio
        x.lineWidth=4;
        x.beginPath(); x.moveTo(34,35); x.lineTo(48,30); x.stroke();
        // Brazo llave
        x.beginPath(); x.moveTo(30,34); x.lineTo(15,26); x.stroke();

        // ── LLAVE INGLESA ──
        x.save();
        x.translate(10,15); x.rotate(-0.5);
        x.lineWidth=3;
        // Mango
        x.beginPath(); x.roundRect(-3.5,-3,7,20,3.5); x.fill();
        // Boca arriba
        x.beginPath(); x.arc(0,-3,5.5,Math.PI,0); x.stroke();
        x.beginPath(); x.moveTo(-3.5,-3); x.lineTo(-6,-3); x.stroke();
        x.beginPath(); x.moveTo(3.5,-3);  x.lineTo(6,-3);  x.stroke();
        // Boca abajo
        x.beginPath(); x.arc(0,17,5.5,0,Math.PI); x.stroke();
        x.beginPath(); x.moveTo(-3.5,17); x.lineTo(-6,17); x.stroke();
        x.beginPath(); x.moveTo(3.5,17);  x.lineTo(6,17);  x.stroke();
        x.restore();

        // ── MOTOCARRO ──
        x.lineWidth=4.5; x.strokeStyle='white';
        // Chasis
        x.beginPath();
        x.moveTo(29,52); x.bezierCurveTo(34,36,52,33,52,33); x.lineTo(99,33);
        x.stroke();
        // Columna caja
        x.lineWidth=3.5;
        x.beginPath(); x.moveTo(52,33); x.lineTo(52,57); x.stroke();

        // ── CAJA DE CARGA ──
        x.fillStyle='white';
        x.beginPath(); x.roundRect(52,30,47,27,5); x.fill();
        x.fillStyle='#E8622A'; x.globalAlpha=0.5;
        x.beginPath(); x.moveTo(52,43); x.lineTo(99,43); x.lineWidth=1.5;
        x.strokeStyle='#E8622A'; x.stroke();
        x.globalAlpha=1.0;

        // ── RUEDAS ──
        x.strokeStyle='white';
        // Delantera
        x.lineWidth=4;
        x.beginPath(); x.arc(22,63,13,0,Math.PI*2); x.stroke();
        x.fillStyle='white';
        x.beginPath(); x.arc(22,63,5,0,Math.PI*2); x.fill();
        x.fillStyle='#E8622A';
        x.beginPath(); x.arc(22,63,2,0,Math.PI*2); x.fill();
        // Trasera
        x.fillStyle='white'; x.strokeStyle='white';
        x.lineWidth=4;
        x.beginPath(); x.arc(88,63,13,0,Math.PI*2); x.stroke();
        x.beginPath(); x.arc(88,63,5,0,Math.PI*2); x.fill();
        x.fillStyle='#E8622A';
        x.beginPath(); x.arc(88,63,2,0,Math.PI*2); x.fill();
        // Rueda media
        x.fillStyle='white'; x.strokeStyle='rgba(255,255,255,0.7)';
        x.lineWidth=3.5;
        x.beginPath(); x.arc(99,63,10,0,Math.PI*2); x.stroke();
        x.beginPath(); x.arc(99,63,4,0,Math.PI*2); x.fill();
        // Eje
        x.lineWidth=3; x.strokeStyle='white';
        x.beginPath(); x.moveTo(76,60); x.lineTo(88,60); x.stroke();

        x.restore();
        return c.toDataURL('image/png');
      }catch(e){ return ''; }
    }

    // ── Inyectar Manifest ───────────────────────────────────────────────────
    function injectManifest(){
      var icon192=mkIcon(192); var icon512=mkIcon(512);
      var manifest={
        name: "ServiKargo Cartagena",
        short_name: "ServiKargo",
        description: "Plataforma de transporte en motocarro · Cartagena, Colombia",
        start_url: "./",
        scope: "./",
        display: "standalone",
        orientation: "portrait-primary",
        background_color: "#0F2340",
        theme_color: "#0CA678",
        lang: "es",
        dir: "ltr",
        categories: ["transportation","logistics","business"],
        icons: [
          {src:icon192,sizes:"192x192",type:"image/png",purpose:"any maskable"},
          {src:icon512,sizes:"512x512",type:"image/png",purpose:"any maskable"}
        ],
        screenshots: [],
        shortcuts: [
          {name:"Solicitar transporte",url:"./?view=cliente",description:"Pide tu transporte"},
          {name:"Conductor · ServiKargo",url:"./?view=driver",description:"Acceso motocarrista"},
          {name:"Admin · ServiKargo",url:"./?view=admin",description:"Panel de control"}
        ]
      };
      // Apple touch icon
      if(icon192){
        var al=document.createElement('link');
        al.rel='apple-touch-icon'; al.href=icon192;
        document.head.appendChild(al);
        var al2=document.createElement('link');
        al2.rel='apple-touch-startup-image'; al2.href=icon512||icon192;
        document.head.appendChild(al2);
      }
      // Manifest link
      var ml=document.createElement('link');
      ml.rel='manifest';
      ml.setAttribute('href','data:application/manifest+json,'+encodeURIComponent(JSON.stringify(manifest)));
      document.head.appendChild(ml);
    }

    // ── Service Worker inline (caché CDN para carga rápida offline) ─────────
    var swCode=[
      "const CACHE='mk-cache-v4';",
      "const CDN_URLS=[",
      "  'https://unpkg.com/react@18/umd/react.production.min.js',",
      "  'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',",
      "  'https://unpkg.com/@babel/standalone@7.23.10/babel.min.js',",
      "  'https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js',",
      "  'https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js',",
      "  'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',",
      "  'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css',",
      "  'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js',",
      "  'https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap',",
      "];",
      "self.addEventListener('install',e=>{",
      "  self.skipWaiting();",
      "  e.waitUntil(caches.open(CACHE).then(c=>",
      "    Promise.allSettled(CDN_URLS.map(u=>",
      "      fetch(u,{mode:'no-cors',credentials:'omit'}).then(r=>c.put(u,r)).catch(()=>{})",
      "    ))",
      "  ));",
      "});",
      "self.addEventListener('activate',e=>{",
      "  e.waitUntil(",
      "    caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k))))",
      "    .then(()=>clients.claim())",
      "  );",
      "});",
      "self.addEventListener('fetch',e=>{",
      "  const u=e.request.url;",
      "  if(u.includes('firebaseio.com')||u.includes('firebasestorage')||",
      "     u.includes('nominatim')||u.includes('tile.openstreetmap')) return;",
      "  if(u.includes('unpkg.com')||u.includes('gstatic.com')||",
      "     u.includes('cdnjs.cloudflare')||u.includes('fonts.google')||",
      "     u.includes('fonts.gstatic')){",
      "    e.respondWith(caches.match(e.request).then(cached=>cached||",
      "      fetch(e.request,{mode:'no-cors'}).then(r=>{",
      "        caches.open(CACHE).then(c=>c.put(e.request,r.clone()));",
      "        return r;",
      "      })));",
      "    return;",
      "  }",
      "  e.respondWith(",
      "    fetch(e.request).then(r=>{",
      "      if(r&&r.ok){const cl=r.clone();caches.open(CACHE).then(c=>c.put(e.request,cl));}",
      "      return r;",
      "    }).catch(()=>caches.match(e.request))",
      "  );",
      "});"
    ].join('\n');

    function registerSW(){
      if(!('serviceWorker' in navigator)) return;
      try{
        var blob=new Blob([swCode],{type:'application/javascript'});
        var url=URL.createObjectURL(blob);
        navigator.serviceWorker.register(url,{scope:'./'})
          .then(function(reg){
            console.log('[ServiKargo PWA] SW registrado ✓', reg.scope);
            URL.revokeObjectURL(url);
            // Actualizar SW en segundo plano
            reg.addEventListener('updatefound',function(){
              var newSW=reg.installing;
              newSW.addEventListener('statechange',function(){
                if(newSW.state==='installed'&&navigator.serviceWorker.controller){
                  console.log('[PWA] Nueva versión disponible');
                }
              });
            });
          })
          .catch(function(err){ console.log('[PWA] SW no pudo registrarse:',err.message); });
      }catch(e){ console.log('[PWA] Error SW:',e); }
    }

    // ── Install prompt ──────────────────────────────────────────────────────
    var deferredPrompt=null;
    window.addEventListener('beforeinstallprompt',function(e){
      e.preventDefault(); deferredPrompt=e;
      var btn=document.getElementById('pwa-install-fab');
      if(btn) btn.style.display='flex';
    });
    window.addEventListener('appinstalled',function(){
      deferredPrompt=null;
      var btn=document.getElementById('pwa-install-fab');
      if(btn) btn.style.display='none';
      console.log('[PWA] ¡App instalada!');
    });
    window.installPWA=function(){
      if(!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(c){
        deferredPrompt=null;
        var btn=document.getElementById('pwa-install-fab');
        if(btn) btn.style.display='none';
      });
    };

    // ── Detectar si ya está instalada (standalone mode) ─────────────────────
    window.isPWA=(window.matchMedia('(display-mode:standalone)').matches||
                  window.navigator.standalone===true);
    if(window.isPWA) document.documentElement.classList.add('pwa-mode');

    // ── Inicializar ─────────────────────────────────────────────────────────
    injectManifest();
    if(document.readyState==='loading'){
      document.addEventListener('DOMContentLoaded',registerSW);
    }else{
      registerSW();
    }

  })();
  </script>
  <!-- ═══ Estilos PWA adicionales ═════════════════════════════════════════ -->
  <style>
    /* Safe area para notch de iPhone */
    body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
    .pwa-mode body{padding-top:env(safe-area-inset-top,0px);}
    /* Splash screen color mientras carga */
    html{background:#0F2340;}
    /* Quitar highlight táctil en botones */
    button,a{-webkit-tap-highlight-color:transparent;}
    /* Mejorar scroll en iOS */
    *{-webkit-overflow-scrolling:touch;}
    /* FAB de instalación */
    #pwa-install-fab{
      position:fixed;bottom:24px;right:16px;z-index:8900;
      background:linear-gradient(135deg,#E8622A,#C4511E);
      color:#fff;border:none;border-radius:50px;
      padding:12px 18px;font-family:'Barlow Condensed',sans-serif;

function playAlertSound(type="new"){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const beeps = type==="new"
      ? [[660,0,.15],[880,.2,.15],[1100,.4,.25]]   // 3 tonos ascendentes = nueva solicitud
      : [[440,0,.1],[440,.15,.1]];                  // 2 tonos cortos = asignación
    beeps.forEach(([freq,start,dur])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type="sine"; o.frequency.value=freq;
      g.gain.setValueAtTime(0, ctx.currentTime+start);
      g.gain.linearRampToValueAtTime(.4, ctx.currentTime+start+.02);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+start+dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime+start); o.stop(ctx.currentTime+start+dur+.05);
    });
    if(navigator.vibrate) navigator.vibrate(type==="new"?[200,100,200]:[150]);
  }catch(e){}
}

function WAModal({req,code,status,tarifa,onClose}){
  if(!req) return null;
  const ratingLink=`${window.location.origin}${window.location.pathname}?calificar=${req.fbKey}`;
  const msgFn = req.type==="hogar" ? WA_HOGAR[status] : WA[status];
  if(!msgFn) return null;
  const msg = req.type==="hogar"
    ? (status==="delivered" ? msgFn(req,code,ratingLink) : msgFn(req,code))
    : (status==="delivered" ? msgFn(req,code,tarifa,ratingLink) : msgFn(req,code,tarifa));
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><Icon name="wa" size={22} color="#25D366"/>
            <h3 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:800,color:G.darkSlate}}>NOTIFICAR CLIENTE</h3>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:G.midGray,cursor:"pointer",display:"flex"}}><Icon name="x" size={20}/></button>
        </div>
        <p style={{fontSize:13,color:G.midGray,marginBottom:10}}>¿Enviar notificación a <strong style={{color:G.darkSlate}}>{req.name}</strong>?</p>
        <div style={{background:"#F0FDF4",borderRadius:10,padding:"12px 14px",marginBottom:14,fontSize:12,color:"#166534",whiteSpace:"pre-wrap",fontFamily:"monospace",lineHeight:1.6,maxHeight:200,overflow:"auto"}}>{msg}</div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:"11px",borderRadius:9,border:`1.5px solid ${G.lightBorder}`,background:"#fff",fontWeight:600,fontSize:14,cursor:"pointer",color:G.midGray}}>Omitir</button>
          <button className="wa-btn" onClick={()=>{openWA(req.phone,msg);onClose();}} style={{flex:2,padding:"11px"}}>
            <Icon name="wa" size={18} color="#fff"/> Enviar WhatsApp
          </button>
        </div>
      </div>
    </div>
  );
}

//  VISTA CALIFICACIÓN (cliente llega desde link del WhatsApp)

function CalificarView({reqId}){
  const [req,setReq]=useState(null);
  const [rating,setRating]=useState(0);
  const [hover,setHover]=useState(0);
  const [comment,setComment]=useState("");
  const [done,setDone]=useState(false);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    db.ref(`requests/${reqId}`).once("value",snap=>{
      if(snap.exists()) setReq({...snap.val(),fbKey:reqId});
      setLoading(false);
    });
  },[reqId]);

  const submit=async()=>{
    if(!rating) return;
    await fbUpdate(`requests/${reqId}`,{rating,ratingComment:comment,ratedAt:new Date().toISOString()});
    // también actualizar stats del conductor o técnico
    const targetPath = req?.assignedDriverId ? `drivers/${req.assignedDriverId}`
                      : req?.assignedTecId   ? `tecnicos/${req.assignedTecId}`
                      : null;
    if(targetPath){
      const tRef=db.ref(targetPath);
      tRef.once("value",snap=>{
        const d=snap.val()||{};
        const prevTotal=(d.ratingTotal||0)+(rating);
        const prevCount=(d.ratingCount||0)+1;
        tRef.update({ratingTotal:prevTotal,ratingCount:prevCount,ratingAvg:prevTotal/prevCount});
      });
    }
    setDone(true);
  };

  if(loading) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:G.sandLight}}>
      <span className="spin-anim"><Icon name="refresh" size={32} color={G.cartagenaBlue}/></span>
    </div>
  );

  if(!req) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:G.sandLight,padding:20}}>
      <div className="card" style={{padding:36,textAlign:"center",maxWidth:360}}>
        <Icon name="x" size={40} color={G.dangerRed}/>
        <h3 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,marginTop:12}}>Servicio no encontrado</h3>
        <p style={{color:G.midGray,fontSize:13,marginTop:8}}>El enlace puede haber expirado.</p>
      </div>
    </div>
  );

  if(req.rating||done) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`linear-gradient(135deg,${G.cartagenaBlue},#0d6a91)`,padding:20}}>
      <div className="card fade-up" style={{maxWidth:380,width:"100%",padding:36,textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>🌟</div>
        <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:800,color:G.darkSlate,marginBottom:8}}>¡GRACIAS POR CALIFICAR!</h2>
        <div style={{fontSize:28,marginBottom:8}}>{[1,2,3,4,5].map(i=><span key={i} style={{color:i<=(req.rating||rating)?"#F59E0B":"#D1D5DB"}}>★</span>)}</div>
        <p style={{color:G.midGray,fontSize:14}}>Tu calificación nos ayuda a mejorar el servicio.</p>
        <p style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:700,color:G.cartagenaBlue,marginTop:16}}>MotoFlex Cartagena 🌴</p>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${G.cartagenaBlue} 0%,#0d6a91 38%,${G.sandLight} 38%)`}}>
      <div style={{padding:"28px 20px 16px",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:6}}>
          <div style={{width:40,height:40,borderRadius:10,background:G.coralAmber,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="truck" size={22} color="#fff"/></div>
          <h1 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:800,color:"#fff",letterSpacing:.5}}>MOTOFLEX CARTAGENA</h1>
        </div>
      </div>
      <div style={{maxWidth:420,margin:"0 auto",padding:"0 16px 36px"}}>
        <div className="card fade-up" style={{padding:28,textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:8}}>⭐</div>
          <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,color:G.darkSlate,marginBottom:4}}>CALIFICA TU SERVICIO</h2>
          <p style={{color:G.midGray,fontSize:13,marginBottom:6}}>Hola <strong>{req.name}</strong>, ¿cómo fue tu experiencia?</p>
          <p style={{color:G.midGray,fontSize:12,marginBottom:20}}>
            {req.type==="hogar"
              ? <>{catIcon(req.categoria)} {catLabel(req.categoria)} · {req.destBarrio}{req.assignedDriver&&<><br/>Técnico: <strong>{req.assignedDriver}</strong></>}</>
              : <>{req.storeName||req.store} → {req.destBarrio}{req.assignedDriver&&<><br/>Motocarro: <strong>{req.assignedDriver}</strong></>}</>
            }
          </p>
          <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:20}}>
            {[1,2,3,4,5].map(i=>(
              <span key={i} className="star"
                onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(0)}
                onClick={()=>setRating(i)}
                style={{fontSize:40,color:i<=(hover||rating)?"#F59E0B":"#D1D5DB"}}>★</span>
            ))}
          </div>
          {rating>0&&<p style={{fontSize:13,color:G.midGray,marginBottom:14}}>{["","😞 Muy malo","😐 Regular","🙂 Bueno","😊 Muy bueno","🤩 Excelente"][rating]}</p>}
          <Field label="Comentario (opcional)">
            <textarea className="field field-plain" rows={3} style={{resize:"none",paddingTop:11}}
              placeholder="Cuéntanos tu experiencia..."
              value={comment} onChange={e=>setComment(e.target.value)}/>
          </Field>
          <button className="btn-primary" onClick={submit} disabled={!rating} style={{marginTop:6}}>
            <Icon name="check" size={18} color="#fff"/> Enviar calificación
          </button>
        </div>
      </div>
    </div>
  );
}

function CustomerView({goHome,goBack,tarifas}){
  const [form,setForm]=useState({name:"",phone:"",store:"",storeCustom:"",destAddress:"",destBarrio:"",barrioCustom:"",itemDesc:"",notes:""});
  const [submitting,setSubmitting]=useState(false);
  const [done,setDone]=useState(null);
  const [errors,setErrors]=useState({});
  const set=(k,v)=>{setForm(f=>({...f,[k]:v}));setErrors(e=>({...e,[k]:false}));};
  const validate=()=>{
    const e={};
    if(!form.name.trim())e.name=true;if(!form.phone.trim())e.phone=true;if(!form.store)e.store=true;
    if(form.store==="Otro almacén (especificar)"&&!form.storeCustom.trim())e.storeCustom=true;
    if(!form.destAddress.trim())e.destAddress=true;
    if(!form.destBarrio)e.destBarrio=true;
    if(form.destBarrio==="__otro__"&&!form.barrioCustom?.trim())e.barrioCustom=true;
    if(!form.itemDesc.trim())e.itemDesc=true;
    setErrors(e);return Object.keys(e).length===0;
  };
  const barrioFinal = form.destBarrio==="__otro__" ? (form.barrioCustom||"Otro") : form.destBarrio;
  const tarifa=tarifas[form.destBarrio]||tarifas["Otro barrio (escribir abajo)"]||0;
  const handleSubmit=async()=>{
    if(!validate())return;
    setSubmitting(true);
    try{
      const pin = String(Math.floor(1000+Math.random()*9000)); // PIN 4 dígitos
      const req={...form,
        destBarrio: barrioFinal,
        storeName:form.store==="Otro almacén (especificar)"?form.storeCustom:form.store,
        status:"pending",createdAt:new Date().toISOString(),tarifa,
        pin, pinConfirmado:false,
        assignedDriver:null,assignedDriverId:null};
      const ref=await fbPush("requests",req);
      const code=ref.key.slice(-6).toUpperCase();
      setDone({code,phone:form.phone,tarifa,pin});
    }catch{alert("Error al enviar. Verifica tu conexión.");}
    setSubmitting(false);
  };
  if(done)return(
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${G.cartagenaBlue},#0d6a91)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div className="card fade-up" style={{maxWidth:400,width:"100%",padding:36,textAlign:"center"}}>
        <div style={{width:64,height:64,borderRadius:32,background:"#D1FAE5",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><Icon name="check" size={32} color={G.successGreen}/></div>
        <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:800,color:G.darkSlate,marginBottom:6}}>¡SOLICITUD ENVIADA!</h2>
        <p style={{color:G.midGray,fontSize:14,marginBottom:14}}>Tu código de seguimiento:</p>
        <div style={{background:G.sandLight,border:`2px solid ${G.goldAccent}`,borderRadius:12,padding:"14px 24px",marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:G.midGray,marginBottom:4,letterSpacing:1}}>CÓDIGO DE SEGUIMIENTO</div>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:800,color:G.cartagenaBlue,letterSpacing:3}}>{done.code}</span>
        </div>
        {/* PIN de verificación — estilo Didi */}
        <div style={{background:"linear-gradient(135deg,#0A4F6E,#0d6a91)",borderRadius:14,padding:"18px 20px",marginBottom:14,textAlign:"center"}}>
          <div style={{fontSize:11,fontWeight:800,color:"rgba(255,255,255,.7)",textTransform:"uppercase",letterSpacing:"2px",marginBottom:8}}>🔐 TU CÓDIGO PIN</div>
          <div style={{fontFamily:"monospace",fontSize:52,fontWeight:900,color:"#FFE066",letterSpacing:"10px",textShadow:"0 0 20px rgba(255,224,102,.4)"}}>{done.pin}</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.7)",marginTop:8,lineHeight:1.6}}>Dáselo al motocarrista cuando llegue.<br/>Sin este PIN no puede iniciar el viaje.</div>
        </div>
        <div style={{background:"#FEF3C7",border:"1px solid #FDE68A",borderRadius:10,padding:"10px 12px",marginBottom:14,fontSize:12,color:"#92400E",fontWeight:600,textAlign:"left"}}>
          ⚠️ <strong>No compartas este PIN</strong> hasta que el motocarrista esté frente a ti.
        </div>
        {done.tarifa>0&&(()=>{
          const com=calcComision(done.tarifa);
          return(
            <div style={{background:"#F0FDF4",border:"1.5px solid #86EFAC",borderRadius:12,padding:"14px 16px",marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:"#166534",letterSpacing:.5,marginBottom:8}}>DESGLOSE DEL SERVICIO</div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:4}}>
                <span style={{color:"#166534"}}>Tarifa del servicio</span>
                <strong style={{color:"#166534"}}>{fmtCOP(done.tarifa)}</strong>
              </div>
              <div style={{fontSize:11,color:"#166534",opacity:.7}}>✅ Pago directo al motocarrista al entregar</div>
            </div>
          );
        })()}

        <button onClick={()=>{setDone(null);setForm({name:"",phone:"",store:"",storeCustom:"",destAddress:"",destBarrio:"",barrioCustom:"",itemDesc:"",notes:""});}}
          style={{background:G.cartagenaBlue,color:"#fff",padding:"11px 28px",borderRadius:10,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,border:"none",cursor:"pointer"}}>
          Nueva solicitud
        </button>
      </div>
    </div>
  );
  const eS=k=>errors[k]?{borderColor:G.dangerRed,boxShadow:"0 0 0 3px rgba(220,38,38,.1)"}:{};
  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${G.cartagenaBlue} 0%,#0d6a91 36%,${G.sandLight} 36%)`}}>
      <div style={{padding:"24px 20px 14px",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:4}}>
          <div style={{width:38,height:38,borderRadius:10,background:G.coralAmber,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="truck" size={20} color="#fff"/></div>
          <h1 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:800,color:"#fff",letterSpacing:.5}}>MOTOFLEX CARTAGENA</h1>
        </div>
        <p style={{color:"rgba(255,255,255,.75)",fontSize:12}}>Solicita tu servicio de transporte en motocarro</p>
      </div>
      <div style={{maxWidth:520,margin:"0 auto",padding:"0 16px 36px"}}>
        <div className="card fade-up" style={{padding:22}}>
          <Field icon="user" label="Nombre completo" required><input className="field" placeholder="Tu nombre completo" value={form.name} onChange={e=>set("name",e.target.value)} style={eS("name")}/></Field>
          <Field icon="phone" label="Teléfono / WhatsApp" required><input className="field" type="tel" placeholder="300 123 4567" value={form.phone} onChange={e=>set("phone",e.target.value)} style={eS("phone")}/></Field>
          <Field icon="pin" label="¿Desde qué almacén?" required>
            <select className="field field-select" value={form.store} onChange={e=>set("store",e.target.value)} style={eS("store")}>
              <option value="">— Selecciona el almacén —</option>
              {ALMACENES.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </Field>
          {form.store==="Otro almacén (especificar)"&&<Field label="Nombre del almacén" required><input className="field field-plain" placeholder="Nombre del almacén" value={form.storeCustom} onChange={e=>set("storeCustom",e.target.value)} style={eS("storeCustom")}/></Field>}
          <Field icon="pin" label="Dirección de destino" required><input className="field" placeholder="Ej: Cra 3 # 45-67, apto 201" value={form.destAddress} onChange={e=>set("destAddress",e.target.value)} style={eS("destAddress")}/></Field>
          <Field icon="pin" label="Barrio de destino" required>
            <select className="field field-select" value={form.destBarrio} onChange={e=>set("destBarrio",e.target.value)} style={eS("destBarrio")}>
              <option value="">— Selecciona el barrio —</option>
              {Object.entries(BARRIOS_POR_ZONA).map(([zona,barrios])=>(
                <optgroup key={zona} label={zona}>
                  {barrios.map(b=><option key={b} value={b}>{b}</option>)}
                </optgroup>
              ))}
              <optgroup label="📍 Otro">
                <option value="__otro__">Otro barrio (escribir abajo)</option>
              </optgroup>
            </select>
          </Field>
          {form.destBarrio==="__otro__"&&(
            <Field label="¿Cuál barrio?" required>
              <input className="field field-plain" placeholder="Escribe el nombre del barrio"
                value={form.barrioCustom||""} onChange={e=>set("barrioCustom",e.target.value)}/>
            </Field>
          )}
          {form.destBarrio&&tarifa>0&&(
            <div style={{background:"#F0FDF4",border:"1.5px solid #86EFAC",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
              <Icon name="money" size={16} color="#166534"/>
              <span style={{fontSize:13,color:"#166534"}}>Tarifa estimada: <strong style={{fontSize:15}}>{fmtCOP(tarifa)}</strong></span>
            </div>
          )}
          <Field icon="box" label="¿Qué va a transportar?" required><input className="field" placeholder="Ej: baldosas, tablones, tuberías, cemento..." value={form.itemDesc} onChange={e=>set("itemDesc",e.target.value)} style={eS("itemDesc")}/></Field>
          <Field label="Observaciones adicionales"><textarea className="field field-plain" rows={3} style={{resize:"none",paddingTop:11}} placeholder="Indicaciones de acceso, piso, referencia..." value={form.notes} onChange={e=>set("notes",e.target.value)}/></Field>
          {Object.values(errors).some(Boolean)&&<p style={{color:G.dangerRed,fontSize:13,fontWeight:600,marginBottom:12,textAlign:"center"}}>⚠ Por favor completa todos los campos requeridos</p>}
          <button className="btn-primary" onClick={handleSubmit} disabled={submitting}>
            {submitting?<><span className="spin-anim"><Icon name="refresh" size={18} color="#fff"/></span> Enviando...</>:<><Icon name="truck" size={18} color="#fff"/> Solicitar servicio</>}
          </button>
        </div>
        <button onClick={goBack||goHome} style={{background:"none",color:G.midGray,fontSize:13,marginTop:12,display:"block",width:"100%",textAlign:"center",textDecoration:"underline",border:"none",cursor:"pointer"}}>← Volver</button>
      </div>
    </div>
  );
}

function CustomerHogarView({goHome,goBack}){
  const [step,setStep]=useState("categoria"); // categoria | form
  const [categoria,setCategoria]=useState(null);
  const [tecnicos,setTecnicos]=useState([]);
  const [loadingTec,setLoadingTec]=useState(false);
  const [form,setForm]=useState({name:"",phone:"",destAddress:"",destBarrio:"",barrioCustom:"",itemDesc:"",notes:""});
  const [errors,setErrors]=useState({});
  const [submitting,setSubmitting]=useState(false);
  const [done,setDone]=useState(null);

  const set=(k,v)=>{setForm(f=>({...f,[k]:v}));setErrors(e=>({...e,[k]:false}));};

  // Cargar técnicos de la categoría elegida (premium primero, luego mejor calificación)
  const selectCategoria=async(catId)=>{
    setCategoria(catId);
    setLoadingTec(true);
    try{
      const snap=await db.ref("tecnicos").get();
      const v=snap.val()||{};
      const list=Object.entries(v).map(([k,t])=>({...t,fbKey:k}))
        .filter(t=>t.categoria===catId)
        .sort((a,b)=>{
          const ap=membresiaActiva(a)?1:0, bp=membresiaActiva(b)?1:0;
          if(ap!==bp) return bp-ap;
          return (b.ratingAvg||0)-(a.ratingAvg||0);
        });
      setTecnicos(list);
    }catch{ setTecnicos([]); }
    setLoadingTec(false);
    setStep("form");
  };

  const validate=()=>{
    const e={};
    if(!form.name.trim())e.name=true;
    if(!form.phone.trim())e.phone=true;
    if(!form.destAddress.trim())e.destAddress=true;
    if(!form.destBarrio)e.destBarrio=true;
    if(form.destBarrio==="__otro__"&&!form.barrioCustom?.trim())e.barrioCustom=true;
    if(!form.itemDesc.trim())e.itemDesc=true;
    setErrors(e);return Object.keys(e).length===0;
  };

  const barrioFinal = form.destBarrio==="__otro__" ? (form.barrioCustom||"Otro") : form.destBarrio;

  const handleSubmit=async()=>{
    if(!validate())return;
    setSubmitting(true);
    try{
      const verifyCode=genCodigoServicio();
      const req={
        ...form, destBarrio:barrioFinal,
        type:"hogar", categoria, verifyCode,
        status:"pending", createdAt:new Date().toISOString(),
        assignedDriver:null, assignedTecId:null,
      };
      const ref=await fbPush("requests",req);
      const code=ref.key.slice(-6).toUpperCase();
      setDone({code,verifyCode,phone:form.phone});
    }catch{ alert("Error al enviar. Verifica tu conexión."); }
    setSubmitting(false);
  };

  const eS=k=>errors[k]?{borderColor:G.dangerRed,boxShadow:"0 0 0 3px rgba(220,38,38,.1)"}:{};

  // ── Pantalla de confirmación ──
  if(done) return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F2340,#1B3461)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div className="card fade-up" style={{maxWidth:400,width:"100%",padding:36,textAlign:"center"}}>
        <div style={{width:64,height:64,borderRadius:32,background:"#D1FAE5",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><Icon name="check" size={32} color={G.successGreen}/></div>
        <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:800,color:G.darkSlate,marginBottom:6}}>¡SOLICITUD ENVIADA!</h2>
        <p style={{color:G.midGray,fontSize:14,marginBottom:14}}>Código de seguimiento:</p>
        <div style={{background:G.sandLight,border:`2px solid ${G.goldAccent}`,borderRadius:12,padding:"14px 24px",marginBottom:14}}>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:800,color:G.cartagenaBlue,letterSpacing:3}}>{done.code}</span>
        </div>
        <div style={{background:"#FEF9E7",border:"2px dashed #D4A843",borderRadius:12,padding:"16px",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#92640A",letterSpacing:.5,marginBottom:6}}>🔑 CÓDIGO DE VERIFICACIÓN</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:36,fontWeight:800,color:"#92640A",letterSpacing:6}}>{done.verifyCode}</div>
          <p style={{fontSize:12,color:"#92640A",marginTop:8,lineHeight:1.5}}>Entrégale este código al técnico <strong>solo cuando termine el trabajo</strong>. Así confirmamos que el servicio fue completado correctamente.</p>
        </div>
        <p style={{fontSize:13,color:G.midGray,lineHeight:1.7,marginBottom:20}}>Te avisaremos por WhatsApp <strong style={{color:G.darkSlate}}>{done.phone}</strong> cuando un técnico acepte tu solicitud.</p>
        <button onClick={goHome}
          style={{background:G.cartagenaBlue,color:"#fff",padding:"11px 28px",borderRadius:10,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,border:"none",cursor:"pointer"}}>
          Volver al inicio
        </button>
      </div>
    </div>
  );

  // ── Paso 1: elegir categoría ──
  if(step==="categoria") return(
    <div style={{minHeight:"100vh",background:`linear-gradient(180deg,#0F2340 0%,#1B3461 28%,${G.bg} 28%)`}}>
      <div style={{padding:"24px 20px 14px",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:4}}>
          <ServiKargoLogo size={38}/>
          <h1 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,color:"#fff",letterSpacing:.5}}>SERVICIOS PARA EL HOGAR</h1>
        </div>
        <p style={{color:"rgba(255,255,255,.75)",fontSize:12}}>Elige el tipo de servicio que necesitas</p>
      </div>
      <div style={{maxWidth:560,margin:"0 auto",padding:"4px 16px 36px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {CATEGORIAS_TECNICOS.map(c=>(
            <button key={c.id} onClick={()=>selectCategoria(c.id)} className="card-hover"
              style={{background:"#fff",border:"none",borderRadius:14,padding:"18px 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
              <span style={{fontSize:28}}>{c.icon}</span>
              <span style={{fontSize:12,fontWeight:700,color:G.darkSlate,textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:.2}}>{c.label}</span>
            </button>
          ))}
        </div>
        <button onClick={goHome} style={{background:"none",color:G.midGray,fontSize:13,marginTop:20,display:"block",width:"100%",textAlign:"center",textDecoration:"underline",border:"none",cursor:"pointer"}}>← Volver al inicio</button>
      </div>
    </div>
  );

  // ── Paso 2: técnicos disponibles + formulario ──
  const cat=CATEGORIAS_TECNICOS.find(c=>c.id===categoria);
  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(180deg,#0F2340 0%,#1B3461 22%,${G.bg} 22%)`}}>
      <div style={{padding:"24px 20px 14px",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:4}}>
          <div style={{width:38,height:38,borderRadius:10,background:G.coralAmber,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{cat?.icon}</div>
          <h1 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,color:"#fff",letterSpacing:.5}}>{cat?.label?.toUpperCase()}</h1>
        </div>
        <p style={{color:"rgba(255,255,255,.7)",fontSize:12}}>Solicita el servicio y te conectamos con un técnico</p>
      </div>

      <div style={{maxWidth:560,margin:"0 auto",padding:"4px 16px 36px"}}>

        {/* Técnicos disponibles (informativo) */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:G.midGray,letterSpacing:.4,marginBottom:8}}>TÉCNICOS DISPONIBLES EN ESTA CATEGORÍA</div>
          {loadingTec
            ? <div className="card" style={{padding:20,textAlign:"center",color:G.midGray,fontSize:13}}><span className="spin-anim"><Icon name="refresh" size={18} color={G.cartagenaBlue}/></span></div>
            : tecnicos.length===0
              ? <div className="card" style={{padding:16,textAlign:"center",color:G.midGray,fontSize:13}}>Aún no hay técnicos registrados en esta categoría, pero tu solicitud quedará en espera de que uno se conecte.</div>
              : (
                <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
                  {tecnicos.map(t=>{
                    const premium=membresiaActiva(t);
                    return(
                      <div key={t.fbKey} className="card" style={{padding:"12px 14px",minWidth:150,flexShrink:0,position:"relative"}}>
                        {premium&&<span className="badge" style={{background:"#FEF9E7",color:"#92640A",position:"absolute",top:8,right:8,fontSize:10}}>⭐</span>}
                        <div style={{fontWeight:700,color:G.darkSlate,fontSize:14,marginBottom:2}}>{t.name}</div>
                        <div style={{display:"flex",gap:2,marginBottom:2}}>
                          {[1,2,3,4,5].map(i=><span key={i} style={{color:i<=Math.round(t.ratingAvg||0)?"#F59E0B":"#D1D5DB",fontSize:13}}>★</span>)}
                        </div>
                        <div style={{fontSize:11,color:G.midGray}}>{t.totalServicios||0} servicios</div>
                        <div className="badge" style={{background:t.available?"#D1FAE5":"#F3F4F6",color:t.available?G.successGreen:G.midGray,marginTop:6}}>{t.available?"Disponible":"Ocupado"}</div>
                      </div>
                    );
                  })}
                </div>
              )
          }
        </div>

        {/* Formulario de solicitud */}
        <div className="card fade-up" style={{padding:22}}>
          <Field icon="user" label="Nombre completo" required><input className="field" placeholder="Tu nombre completo" value={form.name} onChange={e=>set("name",e.target.value)} style={eS("name")}/></Field>
          <Field icon="phone" label="Teléfono / WhatsApp" required><input className="field" type="tel" placeholder="300 123 4567" value={form.phone} onChange={e=>set("phone",e.target.value)} style={eS("phone")}/></Field>
          <Field icon="pin" label="Dirección" required><input className="field" placeholder="Ej: Cra 3 # 45-67, apto 201" value={form.destAddress} onChange={e=>set("destAddress",e.target.value)} style={eS("destAddress")}/></Field>
          <Field icon="pin" label="Barrio" required>
            <select className="field field-select" value={form.destBarrio} onChange={e=>set("destBarrio",e.target.value)} style={eS("destBarrio")}>
              <option value="">— Selecciona el barrio —</option>
              {Object.entries(BARRIOS_POR_ZONA).map(([zona,barrios])=>(
                <optgroup key={zona} label={zona}>
                  {barrios.map(b=><option key={b} value={b}>{b}</option>)}
                </optgroup>
              ))}
              <optgroup label="📍 Otro">
                <option value="__otro__">Otro barrio (escribir abajo)</option>
              </optgroup>
            </select>
          </Field>
          {form.destBarrio==="__otro__"&&(
            <Field label="¿Cuál barrio?" required>
              <input className="field field-plain" placeholder="Escribe el nombre del barrio" value={form.barrioCustom||""} onChange={e=>set("barrioCustom",e.target.value)}/>
            </Field>
          )}
          <Field icon="box" label="Describe el problema" required><textarea className="field field-plain" rows={3} style={{resize:"none",paddingTop:11}} placeholder="Ej: Fuga de agua en el baño, tubería rota..." value={form.itemDesc} onChange={e=>set("itemDesc",e.target.value)} style={{...eS("itemDesc"),resize:"none",paddingTop:11}}/></Field>
          <Field label="Observaciones adicionales"><textarea className="field field-plain" rows={2} style={{resize:"none",paddingTop:11}} placeholder="Indicaciones de acceso, horario disponible..." value={form.notes} onChange={e=>set("notes",e.target.value)}/></Field>

          {Object.values(errors).some(Boolean)&&<p style={{color:G.dangerRed,fontSize:13,fontWeight:600,marginBottom:12,textAlign:"center"}}>⚠ Por favor completa todos los campos requeridos</p>}

          <button className="btn-primary" onClick={handleSubmit} disabled={submitting}>
            {submitting?<><span className="spin-anim"><Icon name="refresh" size={18} color="#fff"/></span> Enviando...</>:<>{cat?.icon} Solicitar servicio</> }
          </button>
        </div>
        <div style={{display:"flex",gap:8,marginTop:8,justifyContent:"center"}}>
          <button onClick={()=>setStep("categoria")} style={{background:"none",color:G.midGray,fontSize:13,textDecoration:"underline",border:"none",cursor:"pointer"}}>← Categorías</button>
          <span style={{color:G.lightBorder}}>|</span>
          <button onClick={goBack||goHome} style={{background:"none",color:G.midGray,fontSize:13,textDecoration:"underline",border:"none",cursor:"pointer"}}>← Menú clientes</button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  VISTA MOTOCARRISTA — Estilo InDriver / Uber para el conductor
// ══════════════════════════════════════════════════════════════════════════════

function DriverApp({goHome=()=>{}}){
  const [step,    setStep]   = React.useState("login");   // login | waiting | active | done
  const [drvData, setDrvData]= React.useState(null);      // datos del moto desde Firebase
  const [drvKey,  setDrvKey] = React.useState("");        // fbKey del driver
  const [pass,    setPass]   = React.useState("");
  const [nameIn,  setNameIn] = React.useState("");
  const [err,     setErr]    = React.useState("");
  const [loading, setLoading]= React.useState(false);
  const [offers,  setOffers] = React.useState([]);        // solicitudes disponibles
  const [myReq,   setMyReq]  = React.useState(null);      // viaje activo
  const [online,  setOnline] = React.useState(false);     // disponible/no disponible
  const [locSent,      setLocSent]      = React.useState(false);
  const [pinInput,     setPinInput]     = React.useState("");
  const [pinError,     setPinError]     = React.useState("");
  const [pinOk,        setPinOk]        = React.useState(false);
  const [showPinModal, setShowPinModal] = React.useState(false);

  const mapRef   = React.useRef(null);
  const mapInst  = React.useRef(null);
  const watchRef = React.useRef(null);

  // ── LOGIN del motocarrista (por número de teléfono registrado) ─────────────
  const doDriverLogin = async() => {
    const tel = nameIn.replace(/\D/g,"");
    if(tel.length<7){setErr("Ingresa tu número de teléfono registrado");return;}
    setLoading(true); setErr("");
    try{
      await new Promise(r=>setTimeout(r,400));
      const allSnap = await db.ref("drivers").get();
      let key="", data=null;
      if(allSnap.exists()){
        const entries = Object.entries(allSnap.val()||{});
        // Buscar por teléfono (ignora espacios y guiones)
        const found = entries.find(([k,v])=>{
          const vt=(v.phone||"").replace(/\D/g,"");
          return vt===tel || vt.endsWith(tel) || tel.endsWith(vt);
        });
        if(found){ key=found[0]; data=found[1]; }
      }
      if(!key){
        setErr("Número no registrado. Pídele al admin que te registre primero.");
        setLoading(false); return;
      }
      // ── Verificar bloqueo por comisión pendiente ──
      if(data.blocked){
        const comVal = data.comisionPendiente||0;
        setErr(`🚫 Cuenta bloqueada por comisión pendiente de ${fmtCOP(comVal)}. Paga y pide al admin que te desbloquee.`);
        setLoading(false); return;
      }
      setDrvKey(key);
      setDrvData(data);
      setOnline(data.available!==false);
      setStep("waiting");
    }catch(e){
      setErr("Error de conexión. Verifica tu internet.");
      console.error("Driver login error:", e);
    }
    setLoading(false);
  };

  // ── Listener único post-login — no depende del step ────────
  React.useEffect(()=>{
    if(!drvKey) return;
    const ref = db.ref("requests");
    const handler = snap=>{
      const all = snap.val()||{};
      const entries = Object.entries(all).map(([k,v])=>({...v,fbKey:k}));

      // Viaje activo asignado a este conductor
      const mine = entries.find(r=>
        r.assignedDriverId===drvKey &&
        ["assigned","transit"].includes(r.status)
      );

      // Solicitudes pendientes disponibles
      const pending = entries
        .filter(r=>r.status==="pending")
        .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

      setOffers(pending);

      if(mine){
        // Solo cambiar a active si no estamos ya ahí — evitar loops
        setMyReq(prev=>{
          if(prev?.fbKey===mine.fbKey && prev?.status===mine.status) return prev;
          return mine;
        });
        setStep(prev=> prev==="done" ? prev : "active");
      }
    };
    ref.on("value", handler);

    // Listener de datos del propio driver
    const dRef = db.ref(`drivers/${drvKey}`);
    dRef.on("value", snap=>{ if(snap.exists()) setDrvData(snap.val()); });

    return()=>{ ref.off("value",handler); dRef.off(); };
  },[drvKey]); // Solo depende de drvKey

  // ── Alerta sonora/visual cuando llegan nuevas solicitudes ───
  const prevOfferCount = React.useRef(0);
  const [drvAlert,    setDrvAlert]    = React.useState(false);
  const [drvAlertMsg, setDrvAlertMsg] = React.useState("");

  React.useEffect(()=>{
    if(step!=="waiting"||!online) return;
    if(offers.length > prevOfferCount.current){
      playAlertSound("new");
      setDrvAlert(true);
      setDrvAlertMsg(`¡${offers.length} viaje${offers.length>1?"s":""} disponible${offers.length>1?"s":""}!`);
      if(navigator.vibrate) navigator.vibrate([300,100,300]);
      setTimeout(()=>setDrvAlert(false), 8000);
    }
    prevOfferCount.current = offers.length;
  },[offers.length, step, online]);

  // ── Aceptar solicitud (modo InDriver: el driver elige) ──────
  const acceptOffer = async(req) => {
    if(loading) return;
    setLoading(true);
    try{
      const now = new Date().toISOString();
      const driverName = drvData?.name || nameIn || "Conductor";

      // 1. Setear estado local PRIMERO — respuesta inmediata al conductor
      const updatedReq = {
        ...req,
        status:          "assigned",
        assignedDriver:  driverName,
        assignedDriverId: drvKey,
        assignedAt:      now,
      };
      setMyReq(updatedReq);
      setStep("active");

      // 2. Escribir en Firebase
      await db.ref(`requests/${req.fbKey}`).update({
        status:           "assigned",
        assignedDriver:   driverName,
        assignedDriverId: drvKey,
        assignedAt:       now,
      });
      await db.ref(`drivers/${drvKey}`).update({available: false});

    } catch(e) {
      console.error("Error acceptOffer:", e);
      // Revertir si Firebase falló
      setMyReq(null);
      setStep("waiting");
      alert("❌ Error al aceptar. Verifica tu conexión e intenta de nuevo.");
    }
    setLoading(false);
  };

  // ── SISTEMA DE FOTOS — sin acumulación de base64 en RAM ────
  // Estrategia: capturar → comprimir a 240px/25% → subir directo → liberar todo
  // Nunca se guarda el base64 completo en el estado de React

  const photoCountTransit  = React.useRef(0);


  // Comprime al mínimo absoluto y devuelve el base64 — libera canvas enseguida
  const compressToMin = (file) => new Promise((res, rej) => {
    // Leer como blob URL en vez de base64 para no duplicar en RAM
    const blobUrl = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      try {
        const MAX = 240; // 240px máximo — ~6-12KB resultado
        const ratio = Math.min(MAX / img.width, MAX / img.height, 1);
        const w = Math.round(img.width  * ratio);
        const h = Math.round(img.height * ratio);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d", {willReadFrequently: false});
        ctx.drawImage(img, 0, 0, w, h);
        const b64 = canvas.toDataURL("image/jpeg", 0.25); // 25% calidad
        // Liberar TODO antes de resolver
        ctx.clearRect(0, 0, w, h);
        canvas.width = 1; canvas.height = 1;
        img.src = "";
        URL.revokeObjectURL(blobUrl);
        res(b64);
      } catch(e) { URL.revokeObjectURL(blobUrl); rej(e); }
    };
    img.onerror = (e) => { URL.revokeObjectURL(blobUrl); rej(e); };
    img.src = blobUrl;
  });


  // ── Marcar en camino / entregado ────────────────────────────
  // ── Verificar PIN antes de iniciar el viaje ─────────────────
  const verificarPinYIniciar = async() => {
    const pinCorrecto = myReq?.pin;
    if(!pinCorrecto){ // si el pedido no tiene PIN (antiguo), dejar pasar
      setShowPinModal(false);
      updateStatus("transit");
      return;
    }
    if(pinInput.trim() === String(pinCorrecto)){
      setPinError("");
      setPinOk(true);
      await db.ref(`requests/${myReq.fbKey}`).update({pinConfirmado:true});
      setShowPinModal(false);
      setTimeout(()=>updateStatus("transit"), 300);
    } else {
      setPinError("PIN incorrecto. Pídele al cliente que te lo muestre.");
      setTimeout(()=>setPinError(""),3000);
    }
  };

  const updateStatus = async(newStatus) => {
    if(!myReq) return;
    const now = new Date().toISOString();

    await db.ref(`requests/${myReq.fbKey}`).update({status:newStatus, updatedAt:now});

    if(newStatus==="delivered"){
      const com = calcComision(myReq.tarifa);
      const deadlineISO = new Date(Date.now()+12*3600*1000).toISOString();
      const code = myReq.fbKey?.slice(-6).toUpperCase()||"";

      // 1. Actualizar stats del driver + marcar comisión pendiente
      await db.ref(`drivers/${drvKey}`).update({
        available: true,
        totalViajes: (drvData?.totalViajes||0)+1,
        ingresos: (drvData?.ingresos||0)+(myReq.tarifa||0),
        comisionPendiente: (drvData?.comisionPendiente||0) + com.valor,
        ultimaComisionDeadline: deadlineISO,
        ultimaComisionReqKey: myReq.fbKey,
      });

      // 2. Registrar comisión en Firebase para auditoría
      await db.ref(`comisiones/${myReq.fbKey}`).set({
        drvKey, drvName: drvData?.name||"",
        reqKey: myReq.fbKey, code,
        tarifa: myReq.tarifa, comision: com.valor, pct: com.label,
        deadline: deadlineISO,
        status: "pendiente",   // pendiente | pagada | bloqueado
        createdAt: now,
      });

      // 3. Enviar WhatsApp al conductor con cobro de comisión
      if(drvData?.phone){
        const msgCom = msgComisionConductor(drvData, myReq, code, com);
        window.open(`https://wa.me/${cleanPhone(drvData.phone)}?text=${encodeURIComponent(msgCom)}`,"_blank");
      }

      // 4. Programar bloqueo automático a las 12h
      setTimeout(async()=>{
        // Verificar si sigue pendiente
        const comSnap = await db.ref(`comisiones/${myReq.fbKey}`).get();
        if(comSnap.exists() && comSnap.val().status==="pendiente"){
          await db.ref(`drivers/${drvKey}`).update({
            blocked: true,
            blockedReason: `Comisión pendiente #${code} — ${fmtCOP(com.valor)}`,
            blockedAt: new Date().toISOString(),
          });
          await db.ref(`comisiones/${myReq.fbKey}`).update({status:"bloqueado"});
          // WhatsApp de bloqueo
          if(drvData?.phone){
            const msgBlq = msgBloqueoConductor(drvData, com.valor);
            window.open(`https://wa.me/${cleanPhone(drvData.phone)}?text=${encodeURIComponent(msgBlq)}`,"_blank");
          }
        }
      }, 12*60*60*1000); // 12 horas en ms

      setStep("done");
      setMyReq(prev=>({...prev,status:"delivered"}));
    } else {
      setMyReq(prev=>({...prev,status:newStatus}));
    }
  };

  // ── Toggle disponibilidad ───────────────────────────────────
  const toggleOnline = async() => {
    const next=!online;
    setOnline(next);
    await db.ref(`drivers/${drvKey}`).update({available:next});
  };

  // ── GPS: enviar ubicación al admin en tiempo real ───────────
  React.useEffect(()=>{
    if(step!=="active"||!drvKey) return;
    if(!navigator.geolocation){ return; }
    watchRef.current = navigator.geolocation.watchPosition(
      pos=>{
        const {latitude:lat,longitude:lng} = pos.coords;
        db.ref(`drivers/${drvKey}/location`).set({lat,lng,updatedAt:new Date().toISOString()});
        setLocSent(true);
        // Actualizar pin en el mapa si existe
        if(mapInst.current && mapInst.current._drvMarker){
          mapInst.current._drvMarker.setLatLng([lat,lng]);
        }
      },
      ()=>setLocSent(false),
      {enableHighAccuracy:true, maximumAge:5000, timeout:10000}
    );
    return()=>{ if(watchRef.current) navigator.geolocation.clearWatch(watchRef.current); };
  },[step,drvKey]);

  // ── Mapa Leaflet para viaje activo ──────────────────────────
  React.useEffect(()=>{
    if(step!=="active"||!mapRef.current) return;
    if(mapInst.current) return;
    const orig = myReq ? (STORE_COORDS[myReq.storeName||myReq.store]||[CTG.lat,CTG.lng]) : [CTG.lat,CTG.lng];
    const dest = myReq ? (BARRIO_COORDS[myReq.destBarrio]||[CTG.lat+0.01,CTG.lng+0.01]) : [CTG.lat+0.01,CTG.lng+0.01];

    const map = L.map(mapRef.current,{center:orig,zoom:14,zoomControl:true});
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(map);

    // Origen
    L.marker(orig,{icon:L.divIcon({html:`<div style="width:34px;height:34px;border-radius:50%;background:#10B981;border:3px solid #fff;box-shadow:0 2px 8px #0004;display:flex;align-items:center;justify-content:center;font-size:16px">📍</div>`,className:"",iconSize:[34,34],iconAnchor:[17,17]})})
      .addTo(map).bindPopup(`<b>Origen:</b> ${myReq?.storeName||myReq?.store||""}`);

    // Destino
    L.marker(dest,{icon:L.divIcon({html:`<div style="width:34px;height:34px;border-radius:50%;background:#EF4444;border:3px solid #fff;box-shadow:0 2px 8px #0004;display:flex;align-items:center;justify-content:center;font-size:16px">🏠</div>`,className:"",iconSize:[34,34],iconAnchor:[17,17]})})
      .addTo(map).bindPopup(`<b>Destino:</b> ${myReq?.destBarrio||""}`);

    // Marcador driver (posición inicial = origen)
    const drvMarker = L.marker(orig,{icon:L.divIcon({html:`<div style="width:38px;height:38px;border-radius:50%;background:#F97316;border:3px solid #fff;box-shadow:0 2px 10px #F9731650;display:flex;align-items:center;justify-content:center;font-size:20px">🛵</div>`,className:"",iconSize:[38,38],iconAnchor:[19,19],zIndexOffset:100})})
      .addTo(map).bindPopup("Tu ubicación actual");
    map._drvMarker = drvMarker;

    // Ruta
    if(window.L && window.L.Routing){
      L.Routing.control({
        waypoints:[L.latLng(orig[0],orig[1]),L.latLng(dest[0],dest[1])],
        routeWhileDragging:false, addWaypoints:false, draggableWaypoints:false,
        show:false, createMarker:()=>null,
        lineOptions:{styles:[{color:"#0A4F6E",weight:5,opacity:.8}]},
      }).addTo(map);
    }
    map.fitBounds(L.latLngBounds([orig,dest]),{padding:[40,40]});
    mapInst.current = map;
  },[step]);

  const fmtTime = iso=>iso?new Date(iso).toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"}):"";

  // ════════════════════════════════════════════
  //  RENDER
  // ════════════════════════════════════════════

  // ── LOGIN ──────────────────────────────────────────────────
  if(step==="login") return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,#0A4F6E,#0d6a91)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:20,padding:"36px 28px",width:"100%",maxWidth:360,boxShadow:"0 20px 60px #0005"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:52,marginBottom:8}}>🛵</div>
          <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:800,color:G.darkSlate}}>PANEL MOTOCARRISTA</h2>
          <p style={{fontSize:13,color:G.midGray,marginTop:4}}>MotoFlex Cartagena</p>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:G.midGray,textTransform:"uppercase",letterSpacing:.6,marginBottom:6}}>Tu número de teléfono registrado</label>
          <input type="tel" style={{width:"100%",padding:"13px 14px",borderRadius:10,border:`1.5px solid ${err?"#EF4444":"#E5E7EB"}`,fontSize:16,fontFamily:"inherit",outline:"none",textAlign:"center",letterSpacing:2}}
            placeholder="300 123 4567" value={nameIn} onChange={e=>{setNameIn(e.target.value);setErr("");}}
            onKeyDown={e=>e.key==="Enter"&&doDriverLogin()}/>
          <p style={{fontSize:11,color:G.midGray,marginTop:6,textAlign:"center"}}>Usa el número que el administrador registró para ti</p>
        </div>
        {err&&<div style={{background:"#FEE2E2",borderRadius:8,padding:"8px 12px",color:"#DC2626",fontSize:13,fontWeight:600,textAlign:"center",marginBottom:12}}>⚠ {err}</div>}
        <button onClick={doDriverLogin} disabled={loading||!nameIn}
          style={{width:"100%",padding:"13px",background:G.coralAmber,color:"#fff",border:"none",borderRadius:12,fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:(!nameIn||loading)?.6:1}}>
          {loading?<><span style={{animation:"spin .7s linear infinite",display:"inline-block"}}>⟳</span> Verificando...</>:"🛵 Entrar →"}
        </button>
      </div>
    </div>
  );

  // ── VIAJE COMPLETADO ───────────────────────────────────────
  if(step==="done") return(
    <div style={{minHeight:"100vh",background:"#F0FDF4",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:20,padding:36,maxWidth:360,width:"100%",textAlign:"center",boxShadow:"0 4px 24px #0002"}}>
        <div style={{fontSize:60,marginBottom:12}}>✅</div>
        <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:800,color:G.darkSlate,marginBottom:6}}>¡VIAJE COMPLETADO!</h2>
        <div style={{background:"#F0FDF4",border:"1.5px solid #86EFAC",borderRadius:12,padding:"16px",marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:"#166534",letterSpacing:.5,marginBottom:10}}>LIQUIDACIÓN DEL VIAJE</div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
            <span style={{color:"#166534"}}>Tarifa cobrada al cliente</span>
            <span style={{fontWeight:700,color:"#166534"}}>{fmtCOP(myReq?.tarifa||0)}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:8}}>
            <span style={{color:"#E8622A"}}>Comisión MotoFlex ({calcComision(myReq?.tarifa).label})</span>
            <span style={{fontWeight:700,color:"#E8622A"}}>– {fmtCOP(calcComision(myReq?.tarifa).valor)}</span>
          </div>
          <div style={{height:1,background:"#86EFAC",marginBottom:8}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:15,color:"#166534"}}>TU GANANCIA NETA</span>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:28,color:"#166534"}}>{fmtCOP((myReq?.tarifa||0)-calcComision(myReq?.tarifa).valor)}</span>
          </div>
        </div>
        <p style={{fontSize:13,color:G.midGray,lineHeight:1.7,marginBottom:20}}>Entregaste: <strong>{myReq?.destBarrio}</strong><br/>Cliente: <strong>{myReq?.name}</strong></p>
        <button onClick={()=>{setStep("waiting");setMyReq(null);if(mapInst.current){mapInst.current.remove();mapInst.current=null;}}}
