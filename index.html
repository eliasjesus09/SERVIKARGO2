//  VISTA TÉCNICO — Servicios para el hogar
// ══════════════════════════════════════════════════════════════════════════════
function TechApp({goHome=()=>{}}){
  const [step,setStep]=React.useState("login"); // login | waiting | active | code | done
  const [tecData,setTecData]=React.useState(null);
  const [tecKey,setTecKey]=React.useState("");
  const [nameIn,setNameIn]=React.useState("");
  const [err,setErr]=React.useState("");
  const [loading,setLoading]=React.useState(false);
  const [offers,setOffers]=React.useState([]);
  const [myReq,setMyReq]=React.useState(null);
  const [codeInput,setCodeInput]=React.useState("");
  const [codeErr,setCodeErr]=React.useState("");

  // ── Login por teléfono registrado ──
  const doLogin=async()=>{
    const tel=nameIn.replace(/\D/g,"");
    if(tel.length<7){setErr("Ingresa tu número de teléfono registrado");return;}
    setLoading(true);setErr("");
    try{
      await new Promise(r=>setTimeout(r,400));
      const snap=await db.ref("tecnicos").get();
      let key="",data=null;
      if(snap.exists()){
        const entries=Object.entries(snap.val()||{});
        const found=entries.find(([k,v])=>{
          const vt=(v.phone||"").replace(/\D/g,"");
          return vt===tel || vt.endsWith(tel) || tel.endsWith(vt);
        });
        if(found){key=found[0];data=found[1];}
      }
      if(!key){
        setErr("Número no registrado como técnico. Pídele al admin que te registre primero.");
        setLoading(false);return;
      }
      if(data.blocked){
        setErr(`🚫 Tu cuenta está bloqueada. Razón: "${data.blockedReason||"Sin especificar"}". Contacta al administrador.`);
        setLoading(false);return;
      }
      setTecKey(key);setTecData(data);setStep("waiting");
    }catch(e){
      setErr("Error de conexión. Verifica tu internet.");
    }
    setLoading(false);
  };

  // ── Listener: ofertas disponibles en mi categoría + mi servicio activo ──
  React.useEffect(()=>{
    if(!tecKey) return;
    const ref=db.ref("requests");
    const handler=snap=>{
      const all=snap.val()||{};
      const entries=Object.entries(all).map(([k,v])=>({...v,fbKey:k}));
      const mine=entries.find(r=>r.assignedTecId===tecKey && ["assigned","transit"].includes(r.status));
      const pending=entries
        .filter(r=>r.type==="hogar" && r.categoria===tecData?.categoria && r.status==="pending")
        .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
      setOffers(pending);
      if(mine){
        setMyReq(prev=>{
          if(prev?.fbKey===mine.fbKey && prev?.status===mine.status) return prev;
          return mine;
        });
        setStep(prev=>prev==="done"?prev:(prev==="code"?prev:"active"));
      }
    };
    ref.on("value",handler);
    const tRef=db.ref(`tecnicos/${tecKey}`);
    tRef.on("value",snap=>{if(snap.exists())setTecData(snap.val());});
    return()=>{ref.off("value",handler);tRef.off();};
  },[tecKey, tecData?.categoria]);

  // ── Alerta sonora/visual por nuevas ofertas ──
  const prevCount=React.useRef(0);
  const [tecAlert,setTecAlert]=React.useState(false);
  React.useEffect(()=>{
    if(step!=="waiting") return;
    if(offers.length>prevCount.current){
      playAlertSound("new");
      setTecAlert(true);
      if(navigator.vibrate) navigator.vibrate([300,100,300]);
      setTimeout(()=>setTecAlert(false),8000);
    }
    prevCount.current=offers.length;
  },[offers.length,step]);

  // ── Aceptar oferta ──
  const acceptOffer=async(req)=>{
    if(loading)return;
    setLoading(true);
    try{
      await fbUpdate(`requests/${req.fbKey}`,{
        status:"assigned",
        assignedDriver:tecData?.name||"",
        assignedTecId:tecKey,
        updatedAt:new Date().toISOString()
      });
      await fbUpdate(`tecnicos/${tecKey}`,{available:false});
      setMyReq({...req,status:"assigned",assignedDriver:tecData?.name||"",assignedTecId:tecKey});
      setStep("active");
    }catch{ alert("No se pudo aceptar el servicio. Intenta de nuevo."); }
    setLoading(false);
  };

  // ── Finalizar servicio con código de verificación ──
  const submitCode=async()=>{
    if(!myReq) return;
    if(codeInput.trim()!==String(myReq.verifyCode)){
      setCodeErr("❌ Código incorrecto. Verifica con el cliente e intenta de nuevo.");
      return;
    }
    setLoading(true);
    try{
      const now=new Date().toISOString();
      await fbUpdate(`requests/${myReq.fbKey}`,{status:"delivered",updatedAt:now,verifiedAt:now});
      const premium=membresiaActiva(tecData);
      const updates={
        available:true,
        totalServicios:(tecData?.totalServicios||0)+1,
      };
      if(!premium) updates.comisionesAcumuladas=(tecData?.comisionesAcumuladas||0)+COMISION_TECNICO_BASICO;
      await fbUpdate(`tecnicos/${tecKey}`,updates);

      // Notificar al cliente por WhatsApp (abre desde el cel del técnico)
      const link=`${window.location.origin}${window.location.pathname}?calificar=${myReq.fbKey}`;
      openWA(myReq.phone, WA_HOGAR.delivered(myReq,myReq.fbKey.slice(-6).toUpperCase(),link));

      setMyReq(prev=>({...prev,status:"delivered"}));
      setStep("done");
    }catch{ setCodeErr("Error de conexión. Intenta de nuevo."); }
    setLoading(false);
  };

  const cat=CATEGORIAS_TECNICOS.find(c=>c.id===tecData?.categoria);
  const premium=membresiaActiva(tecData);

  // ── LOGIN ──
  if(step==="login") return(
    <div style={{minHeight:"100vh",position:"relative",overflow:"hidden",
      background:"linear-gradient(160deg,#080F1C 0%,#0F2340 50%,#112B1E 100%)",
      display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{position:"absolute",inset:0,pointerEvents:"none"}}>
        <div style={{position:"absolute",width:360,height:360,borderRadius:"50%",
          background:"radial-gradient(circle,rgba(12,166,120,.15) 0%,transparent 70%)",bottom:-80,right:-80}}/>
        <div style={{position:"absolute",width:280,height:280,borderRadius:"50%",
          background:"radial-gradient(circle,rgba(217,119,6,.08) 0%,transparent 70%)",top:-60,left:-60}}/>
      </div>
      <div style={{position:"relative",background:"rgba(255,255,255,.04)",backdropFilter:"blur(16px)",
        border:"1px solid rgba(255,255,255,.1)",borderRadius:24,padding:"36px 28px",
        width:"100%",maxWidth:360,boxShadow:"0 24px 64px rgba(0,0,0,.4)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:72,height:72,borderRadius:20,margin:"0 auto 14px",
            background:"linear-gradient(135deg,#E8622A,#C4511E)",
            display:"flex",alignItems:"center",justifyContent:"center",
            boxShadow:"0 10px 28px rgba(12,166,120,.4),0 0 0 8px rgba(12,166,120,.08)",fontSize:32}}>🛠️</div>
          <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:800,color:"#fff"}}>PANEL DEL TÉCNICO</h2>
          <p style={{fontSize:13,color:"rgba(255,255,255,.4)",marginTop:4}}>Servicios para el hogar · ServiKargo</p>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:.6,marginBottom:6}}>Tu número de teléfono registrado</label>
          <input type="tel" style={{width:"100%",padding:"13px 14px",borderRadius:12,
            border:`1.5px solid ${err?"rgba(239,68,68,.6)":"rgba(255,255,255,.15)"}`,
            fontSize:16,fontFamily:"inherit",outline:"none",textAlign:"center",letterSpacing:2,
            background:"rgba(255,255,255,.07)",color:"#fff"}}
            placeholder="300 123 4567" value={nameIn} onChange={e=>{setNameIn(e.target.value);setErr("");}}
            onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
          <p style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:6,textAlign:"center"}}>Usa el número que el administrador registró para ti</p>
        </div>
        {err&&<div style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.3)",borderRadius:10,padding:"9px 14px",color:"#FCA5A5",fontSize:13,fontWeight:600,textAlign:"center",marginBottom:12}}>⚠ {err}</div>}
        <button onClick={doLogin} disabled={loading||!nameIn}
          style={{width:"100%",padding:"14px",background:"linear-gradient(135deg,#E8622A,#C4511E)",color:"#fff",border:"none",borderRadius:12,fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:(!nameIn||loading)?.6:1,boxShadow:"0 6px 20px rgba(12,166,120,.35)"}}>
          {loading?<><span style={{animation:"spin .7s linear infinite",display:"inline-block"}}>⟳</span> Verificando...</>:"🛠️ Entrar →"}
        </button>
      </div>
    </div>
  );

  // ── ESPERANDO OFERTAS ──
  if(step==="waiting") return(
    <div style={{minHeight:"100vh",background:G.bg,display:"flex",flexDirection:"column"}}>
      <div style={{background:"linear-gradient(90deg,#081824,#0A3347)",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0,boxShadow:"0 2px 12px rgba(0,0,0,.3)"}}>
        <div style={{flexShrink:0}}><ServiKargoLogo size={40}/></div>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,color:"#fff",fontSize:15}}>{tecData?.name}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.5)"}}>{cat?.label} {premium&&"· ⭐ Premium"}</div>
        </div>
        <span className="badge" style={{background:"rgba(12,166,120,.2)",color:"#4ADE80"}}>● En línea</span>
      </div>

      <div style={{flex:1,padding:16,maxWidth:560,margin:"0 auto",width:"100%"}}>
        {tecAlert&&(
          <div className="drv-pulse" style={{margin:"0 0 14px",borderRadius:14,padding:"14px 16px",
            display:"flex",alignItems:"center",justifyContent:"space-between",color:"#fff",fontFamily:"'Barlow Condensed',sans-serif"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:26}}>🔔</span>
              <div style={{fontSize:16,fontWeight:800}}>¡Nuevo servicio disponible!</div>
            </div>
            <button onClick={()=>setTecAlert(false)} style={{background:"none",border:"none",color:"rgba(255,255,255,.7)",fontSize:20,cursor:"pointer"}}>✕</button>
          </div>
        )}

        {!premium&&(
          <div style={{background:"#EFF6FF",border:"1.5px solid #BFDBFE",borderRadius:12,padding:"12px 14px",marginBottom:14,fontSize:12,color:"#1E40AF"}}>
            Plan Básico: se cobra {fmtCOP(COMISION_TECNICO_BASICO)} de comisión por cada servicio completado. Comisión acumulada: <strong>{fmtCOP(tecData?.comisionesAcumuladas||0)}</strong>
          </div>
        )}

        <div style={{fontSize:13,fontWeight:700,color:G.midGray,marginBottom:10,letterSpacing:.3}}>SOLICITUDES DISPONIBLES ({offers.length})</div>

        {offers.length===0&&(
          <div className="card" style={{padding:36,textAlign:"center",color:G.midGray}}>
            <div style={{fontSize:36,marginBottom:8}}>{cat?.icon}</div>
            <p style={{fontWeight:600,fontSize:14}}>Sin solicitudes nuevas por ahora</p>
            <p style={{fontSize:12,marginTop:4}}>Te avisaremos con un sonido cuando llegue una.</p>
          </div>
        )}

        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {offers.map(req=>(
            <div key={req.fbKey} className="card req-card" style={{padding:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:800,color:G.darkSlate}}>{req.name}</div>
                  <div style={{fontSize:12,color:G.midGray}}>{req.destBarrio}</div>
                </div>
                <span style={{fontSize:11,color:G.midGray}}>{new Date(req.createdAt).toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"})}</span>
              </div>
              <div style={{background:G.sandLight,borderRadius:10,padding:"10px 12px",marginBottom:10,fontSize:13}}>
                <div style={{display:"flex",gap:8,marginBottom:4}}><Icon name="pin" size={14} color={G.coralAmber}/><span>{req.destAddress}</span></div>
                <div style={{display:"flex",gap:8}}><Icon name="box" size={14} color={G.midGray}/><span>{req.itemDesc}</span></div>
                {req.notes&&<div style={{fontSize:12,color:G.midGray,fontStyle:"italic",marginTop:4}}>💬 "{req.notes}"</div>}
              </div>
              <button onClick={()=>acceptOffer(req)} disabled={loading}
                style={{width:"100%",padding:"12px",background:"linear-gradient(135deg,#E8622A,#C4511E)",color:"#fff",border:"none",borderRadius:10,fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:800,cursor:"pointer",boxShadow:"0 4px 14px rgba(12,166,120,.3)"}}>
                {loading?"Aceptando...":"✅ Aceptar servicio"}
              </button>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"8px 16px 16px",borderTop:"1px solid #F3F4F6",background:"#fff",display:"flex",gap:8}}>
        <button onClick={goHome}
          style={{flex:1,padding:"10px",background:"#F1F5F9",color:G.midGray,border:"none",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
          ← Inicio
        </button>
        <button onClick={()=>{setStep("login");setTecData(null);setTecKey("");setNameIn("");setOffers([]);}}
          style={{flex:2,padding:"10px",background:"#F3F4F6",color:G.midGray,border:"none",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
          ⏻ Cerrar sesión
        </button>
      </div>
    </div>
  );

  // ── SERVICIO ACTIVO ──
  if(step==="active") return(
    <div style={{minHeight:"100vh",background:G.bg,display:"flex",flexDirection:"column"}}>
      <div style={{background:"linear-gradient(90deg,#081824,#0A3347)",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <div style={{width:42,height:42,borderRadius:21,background:"rgba(255,255,255,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{cat?.icon}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,color:"#fff",fontSize:15}}>Servicio en curso</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.5)"}}>{cat?.label}</div>
        </div>
      </div>
      <div style={{flex:1,padding:16,maxWidth:560,margin:"0 auto",width:"100%"}}>
        <div className="card" style={{padding:18,marginBottom:14}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:19,fontWeight:800,color:G.darkSlate,marginBottom:8}}>{myReq?.name}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,fontSize:13}}>
            <div style={{display:"flex",gap:8}}><Icon name="phone" size={14} color={G.midGray}/><span>{myReq?.phone}</span></div>
            <div style={{display:"flex",gap:8}}><Icon name="pin" size={14} color={G.coralAmber}/><span>{myReq?.destAddress}, {myReq?.destBarrio}</span></div>
            <div style={{display:"flex",gap:8}}><Icon name="box" size={14} color={G.midGray}/><span>{myReq?.itemDesc}</span></div>
            {myReq?.notes&&<div style={{fontSize:12,color:G.midGray,fontStyle:"italic"}}>💬 "{myReq.notes}"</div>}
          </div>
          <a className="wa-btn" style={{marginTop:14,width:"100%"}} href={`https://wa.me/${cleanPhone(myReq?.phone||"")}`} target="_blank" rel="noreferrer">
            <Icon name="wa" size={18} color="#fff"/> Contactar al cliente
          </a>
        </div>

        <button onClick={()=>{setCodeInput("");setCodeErr("");setStep("code");}}
          className="btn-primary">
          🔑 Finalizar servicio
        </button>
      </div>
    </div>
  );

  // ── INGRESAR CÓDIGO DE VERIFICACIÓN ──
  if(step==="code") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F2340,#1B3461)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div className="card fade-up" style={{maxWidth:380,width:"100%",padding:32,textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:8}}>🔑</div>
        <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,color:G.darkSlate,marginBottom:8}}>CÓDIGO DE VERIFICACIÓN</h2>
        <p style={{fontSize:13,color:G.midGray,marginBottom:18,lineHeight:1.6}}>Pídele al cliente <strong>{myReq?.name}</strong> el código de 4 dígitos que recibió al solicitar el servicio.</p>
        <input type="tel" maxLength={4} value={codeInput}
          onChange={e=>{setCodeInput(e.target.value.replace(/\D/g,""));setCodeErr("");}}
          style={{width:"100%",padding:"16px",borderRadius:12,border:`2px solid ${codeErr?G.dangerRed:G.lightBorder}`,
            fontSize:32,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,textAlign:"center",letterSpacing:12,outline:"none",marginBottom:12}}
          placeholder="0000"/>
        {codeErr&&<p style={{color:G.dangerRed,fontSize:13,fontWeight:600,marginBottom:12}}>{codeErr}</p>}
        <button className="btn-primary" onClick={submitCode} disabled={loading||codeInput.length!==4}>
          {loading?"Verificando...":"✅ Confirmar finalización"}
        </button>
        <button onClick={()=>setStep("active")} style={{background:"none",color:G.midGray,fontSize:13,marginTop:12,textDecoration:"underline",border:"none",cursor:"pointer"}}>← Volver</button>
      </div>
    </div>
  );

  // ── COMPLETADO ──
  if(step==="done") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#080F1C,#0F2340)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"rgba(255,255,255,.05)",backdropFilter:"blur(16px)",border:"1px solid rgba(255,255,255,.1)",borderRadius:24,padding:36,maxWidth:380,width:"100%",textAlign:"center",boxShadow:"0 24px 64px rgba(0,0,0,.4)"}}>
        <div style={{fontSize:52,marginBottom:8}}>✅</div>
        <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:800,color:"#fff",marginBottom:6}}>¡SERVICIO COMPLETADO!</h2>
        <p style={{fontSize:13,color:"rgba(255,255,255,.5)",lineHeight:1.7,marginBottom:16}}>Notificamos al cliente para que califique tu trabajo.</p>
        {premium ? (
          <div style={{background:"rgba(245,224,163,.15)",border:"1px solid rgba(245,224,163,.3)",borderRadius:12,padding:"14px",marginBottom:16}}>
            <div style={{fontSize:13,color:"#FEF9E7",fontWeight:700}}>⭐ Plan Premium activo</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.6)",marginTop:4}}>Sin comisión por este servicio</div>
          </div>
        ):(
          <div style={{background:"rgba(12,166,120,.12)",border:"1px solid rgba(12,166,120,.3)",borderRadius:12,padding:"14px",marginBottom:16}}>
            <div style={{fontSize:13,color:"#4ADE80",fontWeight:700}}>Comisión de este servicio: {fmtCOP(COMISION_TECNICO_BASICO)}</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.6)",marginTop:4}}>Total acumulado: {fmtCOP((tecData?.comisionesAcumuladas||0))}</div>
          </div>
        )}
        <button onClick={()=>{setMyReq(null);setStep("waiting");}}
          style={{width:"100%",padding:"14px",background:"linear-gradient(135deg,#E8622A,#C4511E)",color:"#fff",border:"none",borderRadius:12,fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:800,cursor:"pointer",boxShadow:"0 6px 20px rgba(12,166,120,.35)"}}>
          🛠️ Buscar más servicios
        </button>
      </div>
    </div>
  );

  return null;
}

//  ADMIN LOGIN
// ══════════════════════════════════════════════════════════════════════════════
// Usuarios del sistema — visibles, solo la clave queda oculta
const ADMIN_USERS = [
  {id:"admin",      label:"Administrador",  avatar:"👨‍💼"},
  {id:"operador1",  label:"Operador 1",     avatar:"🧑‍🔧"},
  {id:"operador2",  label:"Operador 2",     avatar:"🧑‍🔧"},
];

function AdminLogin({onAuth,goHome=()=>{}}){
  const [selUser, setSelUser] = useState("");
  const [pass,    setPass]    = useState("");
  const [showPass,setShowPass]= useState(false);
  const [err,     setErr]     = useState("");
  const [loading, setLoading] = useState(false);

  const login = async() => {
    if(!selUser){setErr("Selecciona un usuario");return;}
    if(!pass.trim()){setErr("Ingresa tu contraseña");return;}
    setLoading(true); setErr("");

    // Credenciales cifradas — no son legibles directamente en el código
    const _c = {
      "admin":     btoa("moto2024"),
      "operador1": btoa("op1234"),
      "operador2": btoa("op5678"),
    };
    await new Promise(r=>setTimeout(r,600)); // pequeño delay simulando verificación
    if(_c[selUser] && atob(_c[selUser])===pass){
      onAuth(selUser, ADMIN_USERS.find(u=>u.id===selUser)?.label||selUser);
    } else {
      setErr("Contraseña incorrecta");
      setTimeout(()=>setErr(""),3000);
    }
    setLoading(false);
  };

  const selData = ADMIN_USERS.find(u=>u.id===selUser);

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${G.darkSlate} 0%,${G.cartagenaBlue} 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div className="card fade-up" style={{maxWidth:380,width:"100%",padding:"36px 28px"}}>

        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:64,height:64,borderRadius:16,background:G.coralAmber,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",boxShadow:`0 8px 24px ${G.coralAmber}50`}}>
            <Icon name="truck" size={32} color="#fff"/>
          </div>
          <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:800,color:G.darkSlate,letterSpacing:.5}}>MOTOFLEX ADMIN</h2>
          <p style={{fontSize:13,color:G.midGray,marginTop:3}}>Panel de control · Cartagena</p>
        </div>

        {/* Selector visual de usuario */}
        <div style={{marginBottom:18}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:G.midGray,textTransform:"uppercase",letterSpacing:.6,marginBottom:8}}>Selecciona tu usuario</label>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {ADMIN_USERS.map(u=>(
              <button key={u.id} onClick={()=>{setSelUser(u.id);setErr("");setPass("");}}
                style={{
                  display:"flex",alignItems:"center",gap:12,padding:"12px 16px",
                  borderRadius:12,border:`2px solid ${selUser===u.id?G.cartagenaBlue:"#E5E7EB"}`,
                  background:selUser===u.id?"#EFF6FF":"#fff",
                  cursor:"pointer",transition:"all .2s",textAlign:"left",
                  boxShadow:selUser===u.id?`0 0 0 3px ${G.cartagenaBlue}20`:"none"
                }}>
                <div style={{width:40,height:40,borderRadius:10,
                  background:selUser===u.id?G.cartagenaBlue:"#F3F4F6",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:20,flexShrink:0,transition:"all .2s"}}>
                  {u.avatar}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:selUser===u.id?G.cartagenaBlue:G.darkSlate}}>{u.label}</div>
                  <div style={{fontSize:11,color:G.midGray,marginTop:1}}>@{u.id}</div>
                </div>
                {selUser===u.id&&(
                  <div style={{width:20,height:20,borderRadius:10,background:G.cartagenaBlue,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </div>
                )}
              </button>
            ))}
          </div>
        </div>

        {/* Campo contraseña — solo aparece al seleccionar usuario */}
        {selUser&&(
          <div style={{marginBottom:14,animation:"fadeUp .25s ease"}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:G.midGray,textTransform:"uppercase",letterSpacing:.6,marginBottom:6}}>
              Contraseña de {selData?.label}
            </label>
            <div style={{position:"relative"}}>
              <input
                type={showPass?"text":"password"}
                className="field field-plain"
                placeholder="••••••••"
                value={pass}
                onChange={e=>{setPass(e.target.value);setErr("");}}
                onKeyDown={e=>e.key==="Enter"&&login()}
                style={{paddingRight:44,...(err?{borderColor:G.dangerRed}:{})}}
                autoFocus
              />
              {/* Botón mostrar/ocultar contraseña */}
              <button onClick={()=>setShowPass(s=>!s)}
                style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",
                  background:"none",border:"none",cursor:"pointer",color:G.midGray,padding:4,
                  display:"flex",alignItems:"center"}}>
                {showPass
                  ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                  : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                }
              </button>
            </div>
          </div>
        )}

        {err&&(
          <div style={{background:"#FEE2E2",border:"1px solid #FECACA",borderRadius:8,padding:"8px 12px",
            color:G.dangerRed,fontSize:13,fontWeight:600,textAlign:"center",marginBottom:12}}>
            ⚠ {err}
          </div>
        )}

        <button className="btn-primary" onClick={login} disabled={loading||!selUser}
          style={{background:selUser?G.cartagenaBlue:"#9CA3AF",width:"100%",
            display:"flex",alignItems:"center",justifyContent:"center",gap:8,
            opacity:(!selUser||loading)?.6:1,transition:"all .2s"}}>
          {loading
            ?<><span className="spin-anim"><Icon name="refresh" size={18} color="#fff"/></span> Verificando...</>
            :<><Icon name="eye" size={18} color="#fff"/> Ingresar al panel</>
          }
        </button>

        <div style={{marginTop:16,display:"flex",alignItems:"center",justifyContent:"center",gap:6,fontSize:11,color:G.midGray}}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          Acceso restringido · Solo personal autorizado
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  ADMIN DASHBOARD
// ══════════════════════════════════════════════════════════════════════════════
function AdminDashboard({onLogout}){
  const [requests,setRequests]=useState([]);
  const [drivers, setDrivers] =useState([]);
  const [tarifas, setTarifas] =useState(TARIFAS_DEFAULT);
  const [tab,     setTab]     =useState("requests");
  const [comisiones, setComisiones] = useState([]);
  const [filter,  setFilter]  =useState("all");
  const [typeFilter, setTypeFilter] = useState("all"); // all | motocarro | hogar
  const [newDrv,  setNewDrv]  =useState({name:"",phone:"",zone:""});
  const [qrStore, setQrStore] =useState("");
  const [qrUrl,   setQrUrl]   =useState("");
  const [notif,   setNotif]   =useState(null);
  const [online,  setOnline]  =useState(true);
  const [waModal, setWaModal] =useState(null);
  const [novModal,setNovModal]=useState(null);
  const [editTarifa,setEditTarifa]=useState(null);

  // ── TÉCNICOS (servicios para el hogar) ──
  const [tecnicos, setTecnicos] = useState([]);
  const [newTec,   setNewTec]   = useState({name:"",phone:"",categoria:CATEGORIAS_TECNICOS[0].id,plan:"basico"});
  const [tecFilter,setTecFilter]= useState("all");

  const [newAlert,  setNewAlert] =useState(false);
  const [newCount,  setNewCount] =useState(0);
  const prevReqIds = useRef(new Set());
  const alertTimer = useRef(null);

  const toast=(msg,ok=true)=>{setNotif({msg,ok});setTimeout(()=>setNotif(null),3500);};
  const dismissAlert=()=>{
    setNewAlert(false); setNewCount(0);
    document.title="MotoFlex Admin";
    if(alertTimer.current) clearTimeout(alertTimer.current);
  };

  useEffect(()=>{
    if(Notification.permission==="default") Notification.requestPermission();

    const rRef=db.ref("requests");
    rRef.on("value",snap=>{
      const v=snap.val()||{};
      const arr=Object.entries(v).map(([k,r])=>({...r,fbKey:k})).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
      setRequests(arr);
      // ── Detectar nuevas solicitudes pendientes ──
      const curIds = new Set(arr.filter(r=>r.status==="pending").map(r=>r.fbKey));
      const added  = [...curIds].filter(id=>!prevReqIds.current.has(id));
      if(added.length>0 && prevReqIds.current.size>0){
        setNewAlert(true);
        setNewCount(n=>n+added.length);
        playAlertSound("new");
        document.title=`🔴 ${added.length} NUEVA SOLICITUD – MotoFlex Admin`;
        sendBrowserNotif("🏍️ MotoFlex – Nueva solicitud", `${added.length} solicitud(es) pendiente(s)`);
        if(alertTimer.current) clearTimeout(alertTimer.current);
        alertTimer.current = setTimeout(dismissAlert, 30000);
      }
      prevReqIds.current = new Set(arr.map(r=>r.fbKey));
    });
    const dRef=db.ref("drivers");
    dRef.on("value",snap=>{const v=snap.val()||{};setDrivers(Object.entries(v).map(([k,d])=>({...d,fbKey:k})));});
    const tRef=db.ref("tarifas");
    tRef.on("value",snap=>{if(snap.val())setTarifas(snap.val());});
    const cRef=db.ref(".info/connected");
    cRef.on("value",snap=>setOnline(snap.val()===true));
    // Listener de comisiones
    const comRef=db.ref("comisiones");
    comRef.on("value",snap=>{
      const v=snap.val()||{};
      setComisiones(Object.entries(v).map(([k,c])=>({...c,fbKey:k})).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)));
    });
    const tecRef=db.ref("tecnicos");
    tecRef.on("value",snap=>{
      const v=snap.val()||{};
      setTecnicos(Object.entries(v).map(([k,t])=>({...t,fbKey:k})));
    });
    return()=>{rRef.off();dRef.off();tRef.off();cRef.off();comRef.off();tecRef.off();if(alertTimer.current)clearTimeout(alertTimer.current);};
  },[]);

  const getCode=req=>req.fbKey?.slice(-6).toUpperCase()||"";

  // ── ACCIONES SOLICITUDES ──
  const markStatus=async(req,status,drvFbKey=null)=>{
    const patch={status,updatedAt:new Date().toISOString()};
    let updReq={...req,...patch};

    // ── Solicitudes de SERVICIOS PARA EL HOGAR (técnicos) ──
    if(req.type==="hogar"){
      if((status==="delivered"||status==="cancelled")&&req.assignedTecId)
        await fbUpdate(`tecnicos/${req.assignedTecId}`,{available:true});
      await fbUpdate(`requests/${req.fbKey}`,patch);
      toast("Estado actualizado ✓");
      if(status!=="cancelled")setWaModal({req:updReq,code:getCode(req),status,tarifa:0});
      return;
    }

    // ── Solicitudes de MOTOCARRO ──
    if(drvFbKey){
      const drv=drivers.find(d=>d.fbKey===drvFbKey);
      patch.assignedDriver=drv?.name||"";patch.assignedDriverId=drvFbKey;
      updReq={...updReq,...patch};
      await fbUpdate(`drivers/${drvFbKey}`,{available:false});
      // stats conductor: sumar viaje
      await fbUpdate(`drivers/${drvFbKey}`,{totalViajes:(drv?.totalViajes||0)+1,ingresos:(drv?.ingresos||0)+(req.tarifa||0)});
    }
    if((status==="delivered"||status==="cancelled")&&req.assignedDriverId)
      await fbUpdate(`drivers/${req.assignedDriverId}`,{available:true});
    await fbUpdate(`requests/${req.fbKey}`,patch);
    toast("Estado actualizado ✓");
    if(status!=="cancelled")setWaModal({req:updReq,code:getCode(req),status,tarifa:req.tarifa||0});
  };

  const deleteRequest=async(req)=>{
    if(!window.confirm("¿Eliminar esta solicitud?"))return;
    if(req.assignedDriverId)await fbUpdate(`drivers/${req.assignedDriverId}`,{available:true});
    if(req.assignedTecId)await fbUpdate(`tecnicos/${req.assignedTecId}`,{available:true});
    await fbRemove(`requests/${req.fbKey}`);toast("Solicitud eliminada");
  };

  // ── TARIFAS ──
  const saveTarifa=async(barrio,valor)=>{
    const upd={...tarifas,[barrio]:Number(valor)};
    setTarifas(upd);
    await fbSet("tarifas",upd);
    toast("Tarifa actualizada ✓");setEditTarifa(null);
  };

  // ── MOTOCARROS ──
  const addDriver=async()=>{
    if(!newDrv.name.trim()||!newDrv.phone.trim()){toast("Nombre y teléfono requeridos",false);return;}
    await fbPush("drivers",{...newDrv,available:true,totalViajes:0,ingresos:0,ratingTotal:0,ratingCount:0,ratingAvg:0,createdAt:new Date().toISOString()});
    setNewDrv({name:"",phone:"",zone:""});toast("Motocarro registrado ✓");
  };
  const toggleDriver=async(drv)=>await fbUpdate(`drivers/${drv.fbKey}`,{available:!drv.available});
  const deleteDriver=async(drv)=>{if(!window.confirm("¿Eliminar?"))return;await fbRemove(`drivers/${drv.fbKey}`);};

  // ── TÉCNICOS (servicios del hogar) ──
  const addTecnico=async()=>{
    if(!newTec.name.trim()||!newTec.phone.trim()){toast("Nombre y teléfono requeridos",false);return;}
    const data={
      name:newTec.name.trim(), phone:newTec.phone.trim(),
      categoria:newTec.categoria, plan:newTec.plan,
      available:true,
      membershipUntil: newTec.plan==="premium" ? new Date(Date.now()+MEMBRESIA_DIAS*86400000).toISOString() : null,
      totalServicios:0, ingresos:0, comisionesAcumuladas:0,
      ratingTotal:0, ratingCount:0, ratingAvg:0,
      createdAt:new Date().toISOString()
    };
    await fbPush("tecnicos",data);
    setNewTec({name:"",phone:"",categoria:CATEGORIAS_TECNICOS[0].id,plan:"basico"});
    toast("Técnico registrado ✓");
  };
  const toggleTecnico=async(t)=>await fbUpdate(`tecnicos/${t.fbKey}`,{available:!t.available});
  const deleteTecnico=async(t)=>{if(!window.confirm("¿Eliminar este técnico?"))return;await fbRemove(`tecnicos/${t.fbKey}`);};

  // ── BLOQUEO / DESBLOQUEO ────────────────────────────────────────────────────
  const RAZONES_BLOQUEO=[
    "Mala conducta con el cliente",
    "Calificaciones reiteradamente bajas (< 2.5 ⭐)",
    "Incumplimiento de entregas",
    "Comisiones sin pagar",
    "Fraude o manipulación de tarifas",
    "Otra razón",
  ];
  const bloquearPersona=async(tipo,item)=>{
    const razon=window.prompt(
      "¿Por qué razón desea bloquear a "+item.name+"?\n\n"+
      RAZONES_BLOQUEO.map((r,i)=>(i+1)+". "+r).join("\n")+
      "\n\nEscriba el número o la razón:"
    );
    if(!razon||!razon.trim()) return;
    const razonFinal = RAZONES_BLOQUEO[Number(razon)-1] || razon.trim();
    const path=tipo==="driver"?`drivers/${item.fbKey}`:`tecnicos/${item.fbKey}`;
    await fbUpdate(path,{
      blocked:true,
      blockedReason:razonFinal,
      blockedAt:new Date().toISOString(),
      available:false,
    });
    toast(`🚫 ${item.name} bloqueado — "${razonFinal}"`);
  };
  const desbloquearPersona=async(tipo,item)=>{
    if(!window.confirm("¿Desbloquear a "+item.name+"? Podrá volver a usar la plataforma.")) return;
    const path=tipo==="driver"?`drivers/${item.fbKey}`:`tecnicos/${item.fbKey}`;
    await fbUpdate(path,{blocked:false,blockedReason:null,blockedAt:null,available:true});
    toast(`✅ ${item.name} desbloqueado`);
  };
  // Activar/renovar membresía premium por 30 días desde hoy
  const renovarMembresia=async(t)=>{
    const until=new Date(Date.now()+MEMBRESIA_DIAS*86400000).toISOString();
    await fbUpdate(`tecnicos/${t.fbKey}`,{plan:"premium",membershipUntil:until});
    toast(`Membresía activada hasta ${new Date(until).toLocaleDateString("es-CO")} ✓`);
  };
  // Pasar a plan básico (cancela premium)
  const pasarABasico=async(t)=>{
    await fbUpdate(`tecnicos/${t.fbKey}`,{plan:"basico",membershipUntil:null});
    toast("Técnico movido a plan básico");
  };
  const cambiarCategoria=async(t,categoria)=>await fbUpdate(`tecnicos/${t.fbKey}`,{categoria});

  // ── QR ──
  const generateQR=()=>{
    const url=window.location.origin+window.location.pathname+"?view=cliente";
    setQrUrl(`https://api.qrserver.com/v1/create-qr-code/?size=300x300&color=0A4F6E&bgcolor=FDF6EC&margin=16&data=${encodeURIComponent(url)}`);
  };

  // ── EXPORTAR EXCEL ──
  const exportExcel=()=>{
    const rows=requests.map(r=>({
      "Código":getCode(r),"Fecha Solicitud":fmtShort(r.createdAt),"Estado":STATUS[r.status]?.label||r.status,
      "Cliente":r.name,"Teléfono":r.phone,"Almacén Origen":r.storeName||r.store,
      "Dir. Destino":r.destAddress,"Barrio":r.destBarrio,"Carga":r.itemDesc,
      "Observaciones":r.notes||"","Motocarro":r.assignedDriver||"","Tarifa":r.tarifa||0,
      "Comisión MotoFlex":calcComision(r.tarifa).valor,"% Comisión":calcComision(r.tarifa).label,
      "Neto Conductor":(r.tarifa||0)-calcComision(r.tarifa).valor,
      "Fotos al salir":   r.tienePhotosTransit  ? r.tienePhotosTransit+" foto(s) ✓"  : "Sin fotos",
      "Fotos al entregar":r.tienePhotosDelivery ? r.tienePhotosDelivery+" foto(s) ✓" : "Sin fotos",
      "Calificación":r.rating||"","Comentario":r.ratingComment||"","Última actualización":fmtShort(r.updatedAt)||"",
    }));
    const ws=XLSX.utils.json_to_sheet(rows);
    ws["!cols"]=[{wch:10},{wch:18},{wch:12},{wch:22},{wch:14},{wch:28},{wch:28},{wch:16},{wch:30},{wch:28},{wch:22},{wch:12},{wch:14},{wch:12},{wch:16},{wch:18},{wch:20},{wch:12},{wch:30},{wch:18}];
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Pedidos MotoFlex");
    XLSX.writeFile(wb,`MotoFlex_Pedidos_${new Date().toLocaleDateString("es-CO").replace(/\//g,"-")}.xlsx`);
    toast("Excel descargado ✓");
  };

  // ── STATS ──
  const pending  =requests.filter(r=>r.status==="pending").length;
  const inProg   =requests.filter(r=>["assigned","transit"].includes(r.status)).length;
  const delivered=requests.filter(r=>r.status==="delivered").length;
  const availDrvs=drivers.filter(d=>d.available);
  const byType   = typeFilter==="all" ? requests : requests.filter(r=>(r.type||"motocarro")===typeFilter);
  const sorted   =filter==="all"?byType:byType.filter(r=>r.status===filter);
  const pendingHogar = requests.filter(r=>r.status==="pending"&&r.type==="hogar").length;
  const pendingMoto  = requests.filter(r=>r.status==="pending"&&(r.type||"motocarro")==="motocarro").length;
  const totalIngresos=requests.filter(r=>r.status==="delivered").reduce((s,r)=>s+(r.tarifa||0),0);
  const avgRating=()=>{const rated=requests.filter(r=>r.rating);return rated.length?( rated.reduce((s,r)=>s+r.rating,0)/rated.length).toFixed(1):"-";};

  const TABS=[{id:"requests",label:"Solicitudes"},{id:"drivers",label:"Motocarros"},{id:"tecnicos",label:"🛠️ Técnicos"},{id:"reports",label:"Reportes"},{id:"comisiones",label:"💰 Comisiones"},{id:"tarifas",label:"Tarifas"},{id:"history",label:"Base Datos"},{id:"qr",label:"QR"}];
  const FILTERS=[{id:"all",label:"Todas"},{id:"pending",label:"Pendientes"},{id:"assigned",label:"Asignados"},{id:"transit",label:"En camino"},{id:"delivered",label:"Entregados"}];

  return(
    <div style={{minHeight:"100vh",background:"#F3F4F6"}}>
      {notif&&<div className="notif" style={{background:notif.ok?G.darkSlate:G.dangerRed}}><Icon name="check" size={16} color="#fff"/> {notif.msg}</div>}
      {waModal&&<WAModal req={waModal.req} code={waModal.code} status={waModal.status} tarifa={waModal.tarifa} onClose={()=>setWaModal(null)}/>}
      {novModal&&<NovedadModal req={novModal.req} code={novModal.code} onClose={()=>setNovModal(null)}/>}

      {/* ── BANNER ALERTA NUEVA SOLICITUD ── */}
      {newAlert&&(
        <div className="alert-blink shake-x" style={{
          position:"fixed",top:0,left:0,right:0,zIndex:10000,
          padding:"13px 20px",display:"flex",alignItems:"center",
          justifyContent:"space-between",gap:12,color:"#fff",
          fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:.4
        }}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:26}}>🔔</span>
            <div>
              <div style={{fontSize:18,fontWeight:800}}>¡{newCount} NUEVA{newCount>1?"S":""} SOLICITUD{newCount>1?"ES":""}!</div>
              <div style={{fontSize:12,opacity:.85,fontWeight:400}}>Toca "Ver ahora" para atenderla</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>{setTab("requests");setFilter("pending");dismissAlert();}}
              style={{background:"rgba(255,255,255,.25)",border:"1.5px solid rgba(255,255,255,.5)",
                color:"#fff",padding:"8px 16px",borderRadius:8,fontWeight:800,
                fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,cursor:"pointer"}}>
              Ver ahora
            </button>
            <button onClick={dismissAlert}
              style={{background:"none",border:"none",color:"rgba(255,255,255,.7)",fontSize:22,cursor:"pointer",padding:4}}>✕</button>
          </div>
        </div>
      )}

      {/* TOP BAR */}
      <div style={{background:G.darkSlate,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:newAlert?52:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,.3)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{position:"relative",flexShrink:0}}>
            <ServiKargoLogo size={36}/>
            {pending>0&&<span style={{position:"absolute",top:-5,right:-5,background:"#EF4444",color:"#fff",
              borderRadius:10,minWidth:18,height:18,fontSize:10,fontWeight:800,
              display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px",
              border:"2px solid #081824",zIndex:1}}>{pending}</span>}
          </div>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:800,color:"#fff",letterSpacing:.5}}>MOTOFLEX ADMIN</div>
            <div style={{display:"flex",alignItems:"center",gap:5,marginTop:1}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:online?"#4ADE80":"#F87171",display:"inline-block"}}/>
              <span style={{fontSize:10,color:"rgba(255,255,255,.5)"}}>{online?"En línea · tiempo real":"Sin conexión"}</span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>window.confirm("¿Volver al inicio? Se cerrará la sesión admin.")&&onLogout()}
            style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,padding:"6px 12px",color:"rgba(255,255,255,.6)",display:"flex",alignItems:"center",gap:5,cursor:"pointer",fontSize:12,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>
            ← Inicio
          </button>
          <button onClick={onLogout} style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:8,padding:8,color:"rgba(255,255,255,.7)",display:"flex",alignItems:"center",cursor:"pointer"}}><Icon name="x" size={16}/></button>
        </div>
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:"20px 16px 48px"}}>
        {/* STATS */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr) repeat(3,1fr)",gap:10,marginBottom:20}}>
          {[
            {label:"Pendientes",  value:pending,                         accent:"#F59E0B"},
            {label:"En curso",    value:inProg,                          accent:"#3B82F6"},
            {label:"Entregados",  value:delivered,                       accent:G.successGreen},
            {label:"Disponibles", value:`${availDrvs.length}/${drivers.length}`, accent:G.coralAmber},
            {label:"Ingresos brutos",value:fmtCOP(totalIngresos),        accent:"#8B5CF6"},
            {label:"Mi comisión",  value:fmtCOP(requests.filter(r=>r.status==="delivered").reduce((s,r)=>s+calcComision(r.tarifa).valor,0)), accent:G.coralAmber},
          ].map(s=>(
            <div key={s.label} className="stat-card">
              <div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:s.accent,borderRadius:"12px 0 0 12px"}}/>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,color:G.darkSlate,lineHeight:1}}>{s.value}</div>
              <div style={{fontSize:10,color:G.midGray,fontWeight:600,marginTop:4,letterSpacing:.3}}>{s.label.toUpperCase()}</div>
            </div>
          ))}
        </div>

        {/* TABS */}
        <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:2}}>
          {TABS.map(t=><button key={t.id} className={`tab ${tab===t.id?"tab-active":"tab-inactive"}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
        </div>

        {/* ── SOLICITUDES ─────────────────────────────────────────────────── */}
        {tab==="requests"&&(<>
          {/* Selector de tipo de servicio */}
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            {[
              {id:"all",label:"Todos",icon:"📋"},
              {id:"motocarro",label:"Motocarro",icon:"🏍️",count:pendingMoto},
              {id:"hogar",label:"Hogar",icon:"🛠️",count:pendingHogar},
            ].map(t=>(
              <button key={t.id} onClick={()=>{setTypeFilter(t.id);setFilter("all");}}
                style={{flex:1,padding:"9px 10px",borderRadius:10,fontSize:13,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:.3,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,
                  background:typeFilter===t.id?G.cartagenaBlue:"#fff",color:typeFilter===t.id?"#fff":G.midGray,
                  border:`1.5px solid ${typeFilter===t.id?G.cartagenaBlue:G.lightBorder}`}}>
                <span>{t.icon}</span>{t.label}
                {t.count>0&&<span style={{background:typeFilter===t.id?"rgba(255,255,255,.25)":"#EF4444",color:"#fff",borderRadius:10,fontSize:10,fontWeight:800,padding:"1px 6px"}}>{t.count}</span>}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>

        {/* ── BASE DE DATOS ─────────────────────────────────────────────── */}
        {tab==="history"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
              <div>
                <h3 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:800,color:G.darkSlate}}>BASE DE DATOS DE PEDIDOS</h3>
                <p style={{fontSize:13,color:G.midGray,marginTop:2}}>{requests.length} registros en total</p>
              </div>
              <button className="excel-btn" onClick={exportExcel}><Icon name="excel" size={18} color="#fff"/> Exportar a Excel</button>
            </div>
            {requests.length===0
              ?<div className="card" style={{padding:48,textAlign:"center",color:G.midGray}}><Icon name="db" size={40} color="#ddd"/><p style={{marginTop:12,fontWeight:600}}>Aún no hay pedidos registrados</p></div>
              :<div style={{overflowX:"auto",borderRadius:12,boxShadow:"0 2px 12px rgba(0,0,0,.07)",border:`1px solid ${G.lightBorder}`}}>
                <table>
                  <thead><tr>
                    <th>#Código</th><th>Fecha</th><th>Estado</th><th>Cliente</th>
                    <th>Teléfono</th><th>Origen</th><th>Destino</th><th>Barrio</th>
                    <th>Carga</th><th>Motocarro</th><th>Tarifa</th><th>Comisión</th><th>Neto Drv</th><th>⭐</th>
                  </tr></thead>
                  <tbody>
                    {requests.map(r=>(
                      <tr key={r.fbKey}>
                        <td style={{fontFamily:"monospace",fontWeight:700,color:G.cartagenaBlue,whiteSpace:"nowrap"}}>#{getCode(r)}</td>
                        <td style={{whiteSpace:"nowrap",fontSize:11,color:G.midGray}}>{fmtShort(r.createdAt)}</td>
                        <td><StatusBadge status={r.status}/></td>
                        <td style={{fontWeight:600,whiteSpace:"nowrap"}}>{r.name}</td>
                        <td style={{whiteSpace:"nowrap"}}>{r.phone}</td>
                        <td style={{maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.storeName||r.store}</td>
                        <td style={{maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.destAddress}</td>
                        <td style={{whiteSpace:"nowrap"}}>{r.destBarrio}</td>
                        <td style={{maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.itemDesc}</td>
                        <td style={{whiteSpace:"nowrap",color:r.assignedDriver?G.cartagenaBlue:G.midGray}}>{r.assignedDriver||"—"}</td>
                        <td style={{whiteSpace:"nowrap",color:"#166534",fontWeight:600}}>{fmtCOP(r.tarifa||0)}</td>
                        <td style={{whiteSpace:"nowrap",color:G.coralAmber,fontWeight:600}}>{fmtCOP(calcComision(r.tarifa).valor)}</td>
                        <td style={{whiteSpace:"nowrap",color:G.successGreen,fontWeight:600}}>{fmtCOP((r.tarifa||0)-calcComision(r.tarifa).valor)}</td>
                        <td style={{textAlign:"center"}}>{r.rating?<span style={{color:"#F59E0B",fontWeight:700}}>{r.rating}★</span>:"—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            }
          </div>
        )}

        {/* ── QR ──────────────────────────────────────────────────────────── */}
        {tab==="qr"&&(
          <div className="card" style={{padding:24}}>
            <h3 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,color:G.darkSlate,marginBottom:6}}>GENERAR CÓDIGO QR</h3>
            <p style={{fontSize:13,color:G.midGray,marginBottom:16,lineHeight:1.5}}>El QR lleva al formulario del cliente. Imprímelo y pégalo en cada almacén aliado.</p>
            <div style={{background:"#F0FDF4",border:`1.5px solid #86EFAC`,borderRadius:10,padding:"11px 14px",marginBottom:16}}>

              <p style={{fontSize:11,fontFamily:"monospace",wordBreak:"break-all",color:"#166534"}}>{window.location.origin}{window.location.pathname}?view=cliente</p>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
              <select className="field field-select" value={qrStore} onChange={e=>setQrStore(e.target.value)}>
                <option value="">Selecciona el almacén (etiqueta)</option>
                {ALMACENES.filter(s=>s!=="Otro almacén (especificar)").map(s=><option key={s} value={s}>{s}</option>)}
              </select>
              <button className="btn-primary" onClick={generateQR} style={{background:G.cartagenaBlue}}><Icon name="qr" size={18} color="#fff"/> Generar QR</button>
            </div>

              <div style={{textAlign:"center"}}>
                <div style={{display:"inline-block",background:G.sandLight,border:`2px dashed ${G.goldAccent}`,borderRadius:16,padding:24}}>
                  <img src={qrUrl} alt="QR" style={{width:200,height:200,display:"block",margin:"0 auto"}}/>
                  <div style={{marginTop:10,fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:700,color:G.darkSlate}}>{qrStore||"MotoFlex Cartagena"}</div>

                </div>
                <p style={{fontSize:12,color:G.midGray,marginTop:12}}>💡 Clic derecho → "Guardar imagen" → imprimir y pegar en el almacén.</p>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

//  APP
// ══════════════════════════════════════════════════════════════════════════════

// ── Las credenciales de admin se crean directamente en Firebase Console ──
// No hay contraseñas en este código fuente

function App(){
  const [tarifas,setTarifas]=useState(TARIFAS_DEFAULT);
  const initView=()=>{
    const p=new URLSearchParams(window.location.search);
    if(p.get("calificar")) return "calificar";
    if(p.get("view")==="cliente"||window.location.hash==="#cliente") return "customer";
    if(p.get("view")==="hogar") return "hogar";
    if(p.get("view")==="clientes") return "clienteMenu";
    if(p.get("view")==="prestadores") return "proveedorMenu";
    if(p.get("view")==="driver"||p.get("view")==="motocarro") return "driver";
    if(p.get("view")==="tech"||p.get("view")==="tecnico") return "tech";
    return "home";
  };
  const [view,  setView] =useState(initView);
  const [authed,   setAuthed]   = useState(false);
  const [adminUser,setAdminUser] = useState("");

  useEffect(()=>{
    db.ref("tarifas").on("value",snap=>{if(snap.val())setTarifas(snap.val());});
  },[]);

  const calificarId=new URLSearchParams(window.location.search).get("calificar");

  return(
    <>
      {/* ── HOME y sub-menús ── */}
      {view==="home"         &&<HomeScreen      goCliente={()=>setView("clienteMenu")} goProveedor={()=>setView("proveedorMenu")} goAdmin={()=>setView("admin")}/>}
      {view==="clienteMenu"  &&<ClienteMenuView goTransporte={()=>setView("customer")} goHogar={()=>setView("hogar")} goHome={()=>setView("home")}/>}
      {view==="proveedorMenu"&&<ProveedorMenuView goDriver={()=>setView("driver")} goTech={()=>setView("tech")} goHome={()=>setView("home")}/>}
      {/* ── VISTAS DE SERVICIO ── */}
      {view==="customer"  &&<CustomerView goHome={()=>setView("home")} goBack={()=>setView("clienteMenu")} tarifas={tarifas}/>}
      {view==="hogar"     &&<CustomerHogarView goHome={()=>setView("home")} goBack={()=>setView("clienteMenu")}/>}
      {view==="calificar" &&<CalificarView reqId={calificarId}/>}
      {/* ── ADMIN ── */}
      {view==="admin"     &&!authed&&<AdminLogin onAuth={(u,n)=>{setAuthed(true);}} goHome={()=>setView("home")}/>}
      {view==="admin"     &&authed &&<AdminDashboard onLogout={()=>{setAuthed(false);setView("home");}}/>}
      {/* ── PRESTADORES ── */}
      {view==="driver"    &&<DriverApp goHome={()=>setView("proveedorMenu")}/>}
      {view==="tech"      &&<TechApp   goHome={()=>setView("proveedorMenu")}/>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
